<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポニーレース</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2e7d32;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 10px;
}

canvas {
  width: 100%;
  max-width: 800px;
  background: #3fa34d;
  border-radius: 10px;
}

.buttons {
  margin-top: 10px;
}

button {
  margin: 5px;
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.start { background: gold; color: black; }

.result {
  margin-top: 10px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>🏇 ポニーレース</h1>

<canvas id="game" width="800" height="300"></canvas>

<div class="buttons">
  <button onclick="boost(0)">🐎 逃げ</button>
  <button onclick="boost(1)">🐴 先行</button>
  <button onclick="boost(2)">🦄 差し</button>
  <button onclick="boost(3)">🐐 わたし🔥</button>
</div>

<button class="start" onclick="startRace()">スタート！</button>

<div class="result" id="result"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const FINISH = 700;

let ponies;
let running = false;
let winner = null;

function reset() {
  ponies = [
    { x: 20, y: 60, base: 3.2, boost: 0, name: "逃げ", icon: "🐎" },
    { x: 20, y: 120, base: 2.6, boost: 0, name: "先行", icon: "🐴" },
    { x: 20, y: 180, base: 2.2, boost: 0, name: "差し", icon: "🦄" },
    { x: 20, y: 240, base: 2.0, boost: 0, name: "わたし", icon: "🐐" }
  ];
  running = false;
  winner = null;
  document.getElementById("result").textContent = "";
}

reset();

function startRace() {
  reset();
  running = true;
}

function boost(i) {
  if (!running) return;

  if (ponies[i].name === "わたし") {
    ponies[i].boost += 2.5; // 自分は強い🔥
  } else {
    ponies[i].boost += 0.8;
  }
}

function update() {
  if (!running) return;

  ponies.forEach(p => {
    let random = Math.random() * 1.5;

    // 差しは後半強い
    if (p.name === "差し" && p.x > 300) {
      random += 1.5;
    }

    // ラストスパート
    if (p.x > 500) {
      random += Math.random() * 2;
    }

    p.x += p.base + random + p.boost;
    p.boost *= 0.9;

    if (p.x >= FINISH && !winner) {
      winner = p.name;
      running = false;

      if (winner === "わたし") {
        document.getElementById("result").textContent =
          "🎉 わたしが勝った！ガチャへGO！";
        
        setTimeout(() => {
          window.location.href = "coin.html"; // ←ここガチャページ
        }, 1500);

      } else {
        document.getElementById("result").textContent =
          "負けた…もう一回！";
      }
    }
  });
}

function draw() {
  ctx.clearRect(0,0,800,300);

  // 芝
  ctx.fillStyle = "#3fa34d";
  ctx.fillRect(0,0,800,300);

  // ゴール
  ctx.fillStyle = "white";
  ctx.fillRect(FINISH, 0, 5, 300);

  // ポニー
  ctx.font = "30px Arial";
  ponies.forEach(p => {
    ctx.fillText(p.icon + " " + p.name, p.x, p.y);
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
