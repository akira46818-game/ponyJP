<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>位置取り判断ゲーム</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 200, 120, 0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(120, 180, 255, 0.16), transparent 25%),
        linear-gradient(180deg, #111833 0%, #1e2f67 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 20px 16px 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      text-align: center;
      color: rgba(255,255,255,0.84);
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 10px 8px;
      font-weight: 700;
      font-size: 15px;
    }

    .race-box {
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .race-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .course-banner {
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      line-height: 1.6;
    }

    .horse-list {
      display: grid;
      gap: 10px;
    }

    .horse-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 12px;
      text-align: left;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .horse-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .info-line {
      font-size: 13px;
      color: rgba(255,255,255,0.84);
      line-height: 1.6;
    }

    .result-box {
      display: none;
      margin-top: 16px;
      border-radius: 20px;
      padding: 16px 14px;
      line-height: 1.7;
    }

    .correct {
      background: rgba(60, 200, 120, 0.18);
      border: 1px solid rgba(60, 200, 120, 0.28);
    }

    .wrong {
      background: rgba(255, 90, 90, 0.16);
      border: 1px solid rgba(255, 90, 90, 0.24);
    }

    .result-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      text-align: center;
    }

    .explain {
      font-size: 15px;
      color: rgba(255,255,255,0.92);
      margin-bottom: 12px;
    }

    .next-btn, .reward-btn, .back-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 10px;
      cursor: pointer;
    }

    .next-btn {
      background: #06C755;
      color: #fff;
    }

    .reward-btn {
      background: gold;
      color: #1b1b1b;
      display: none;
    }

    .back-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .mini-note {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏇 位置取り判断ゲーム</h1>
    <div class="sub">
      コース・枠順・脚質を見て、<br>
      <b>最も有利に運べそうな馬</b> を選んでください。
    </div>

    <div class="topbar">
      <div class="pill">問題 <span id="questionNo">1</span> / 5</div>
      <div class="pill">正解数 <span id="score">0</span></div>
    </div>

    <div class="race-box">
      <div class="race-title" id="raceTitle">第1問</div>
      <div class="course-banner" id="courseBanner">阪神芝1400m / 内前有利</div>
      <div class="horse-list" id="horseList"></div>
    </div>

    <div id="resultBox" class="result-box">
      <div id="resultTitle" class="result-title">正解！</div>
      <div id="explain" class="explain"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
      <a class="reward-btn" id="rewardBtn" href="reward-pony-01.html">🎁 カードを受け取る</a>
      <a class="back-btn" href="index.html">← 一覧へ戻る</a>
    </div>

    <div class="mini-note">
      同じ能力でも、内枠先行と外枠追込では運びやすさが違います。<br>
      位置取りを想像できると、買っていい人気馬と危ない人気馬が見えてきます。
    </div>
  </div>

  <script>
    const quizzes = [
      {
        title: "第1問",
        course: "阪神芝1400m / 内前有利",
        horses: [
          {
            name: "ルミナ",
            info: "2枠 / 先行型 / スタート安定 / ロスなく運べる",
            best: true,
            reason: "内前有利のコースで、内枠先行は大きな武器です。ルミナは最も理想的な位置取りがしやすいです。"
          },
          {
            name: "ステラ",
            info: "7枠 / 差し型 / 直線勝負 / 外を回されやすい",
            best: false,
            reason: ""
          },
          {
            name: "フレア",
            info: "8枠 / 逃げ型 / 先手は取れるが外枠ロスあり",
            best: false,
            reason: ""
          },
          {
            name: "アクア",
            info: "6枠 / 差し型 / 安定型だがコース形状は微妙",
            best: false,
            reason: ""
          }
        ],
        answer: "ルミナ"
      },
      {
        title: "第2問",
        course: "中山ダート1200m / 先行有利",
        horses: [
          {
            name: "フレア",
            info: "3枠 / 逃げ型 / テンが速い / 前で運びやすい",
            best: true,
            reason: "短距離ダートで先行有利、さらに内目の枠で前へ行けるフレアは位置取り面で有利です。"
          },
          {
            name: "ノクス",
            info: "8枠 / 差し型 / 展開待ち / 外からロスあり",
            best: false,
            reason: ""
          },
          {
            name: "ストーム",
            info: "7枠 / 追込型 / ハマり待ち / 序盤が苦しい",
            best: false,
            reason: ""
          },
          {
            name: "にゃ〜ご",
            info: "5枠 / 善戦型 / 好位差し / 決め手は足りない",
            best: false,
            reason: ""
          }
        ],
        answer: "フレア"
      },
      {
        title: "第3問",
        course: "東京芝2400m / 直線長い / 差し届く",
        horses: [
          {
            name: "ステラ",
            info: "5枠 / 差し型 / 長く脚を使える / 広いコース向き",
            best: true,
            reason: "東京の長い直線は差し馬向きです。ステラはコースと脚質の相性が最も良いです。"
          },
          {
            name: "フレア",
            info: "1枠 / 逃げ型 / マイペースなら怖いが長丁場は少し不安",
            best: false,
            reason: ""
          },
          {
            name: "ルミナ",
            info: "4枠 / 先行型 / 総合力高いがベスト条件ではない",
            best: false,
            reason: ""
          },
          {
            name: "テラ",
            info: "2枠 / パワー型 / 長距離はこなすが切れ負けあり",
            best: false,
            reason: ""
          }
        ],
        answer: "ステラ"
      },
      {
        title: "第4問",
        course: "小回りダート1800m / 内先行有利",
        horses: [
          {
            name: "テラ",
            info: "1枠 / 先行型 / 器用 / 小回りでロスなく運べる",
            best: true,
            reason: "小回りで内枠先行は位置取り面でかなり有利です。テラが最も運びやすい形です。"
          },
          {
            name: "アクア",
            info: "7枠 / 差し型 / 外から動く必要あり",
            best: false,
            reason: ""
          },
          {
            name: "ノクス",
            info: "6枠 / 差し寄り / コーナーで位置が悪くなりやすい",
            best: false,
            reason: ""
          },
          {
            name: "ストーム",
            info: "8枠 / 追込型 / 展開待ち / 小回りで不利",
            best: false,
            reason: ""
          }
        ],
        answer: "テラ"
      },
      {
        title: "第5問",
        course: "新潟芝1600m / 外差し届く",
        horses: [
          {
            name: "アクア",
            info: "7枠 / 差し型 / 直線で脚を使える / 外目スムーズ",
            best: true,
            reason: "新潟外回りは差しが届きやすく、外目からスムーズに運べるアクアが最も向きます。"
          },
          {
            name: "フレア",
            info: "2枠 / 逃げ型 / ペース次第では残るが条件はベストでない",
            best: false,
            reason: ""
          },
          {
            name: "ルミナ",
            info: "4枠 / 先行型 / まとめては来るが差し有利の分少し割引",
            best: false,
            reason: ""
          },
          {
            name: "にゃ〜ご",
            info: "3枠 / 善戦型 / 決め手勝負ではやや不足",
            best: false,
            reason: ""
          }
        ],
        answer: "アクア"
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const horseList = document.getElementById("horseList");
    const questionNo = document.getElementById("questionNo");
    const scoreEl = document.getElementById("score");
    const raceTitle = document.getElementById("raceTitle");
    const courseBanner = document.getElementById("courseBanner");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const explain = document.getElementById("explain");
    const nextBtn = document.getElementById("nextBtn");
    const rewardBtn = document.getElementById("rewardBtn");

    function renderQuiz() {
      answered = false;
      resultBox.style.display = "none";

      const quiz = quizzes[current];
      questionNo.textContent = current + 1;
      scoreEl.textContent = score;
      raceTitle.textContent = quiz.title;
      courseBanner.textContent = quiz.course;

      horseList.innerHTML = "";
      quiz.horses.forEach(horse => {
        const btn = document.createElement("button");
        btn.className = "horse-btn";
        btn.innerHTML = `
          <div class="horse-name">🐴 ${horse.name}</div>
          <div class="info-line">${horse.info}</div>
        `;
        btn.onclick = () => answer(horse.name);
        horseList.appendChild(btn);
      });
    }

    function answer(selectedName) {
      if (answered) return;
      answered = true;

      const quiz = quizzes[current];
      const correct = selectedName === quiz.answer;
      const answerHorse = quiz.horses.find(h => h.name === quiz.answer);

      resultBox.style.display = "block";

      if (correct) {
        score++;
        scoreEl.textContent = score;
        resultBox.className = "result-box correct";
        resultTitle.textContent = "🎉 正解！";
      } else {
        resultBox.className = "result-box wrong";
        resultTitle.textContent = "❌ 不正解";
      }

      explain.textContent = `正解は「${quiz.answer}」です。${answerHorse.reason}`;

      if (current === quizzes.length - 1) {
        nextBtn.style.display = "none";
        if (score >= 3) {
          rewardBtn.style.display = "block";
        } else {
          rewardBtn.style.display = "none";
        }
      } else {
        nextBtn.style.display = "block";
        rewardBtn.style.display = "none";
      }
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    renderQuiz();
  </script>
</body>
</html>
