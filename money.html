          { key: "C", title: "均等ばら撒き", desc: "5頭に200円ずつ" }
        ],
        answer: "A",
        explanation: "人気薄でも条件がハマるなら、ある程度攻める価値があります。保険を残した厚め配分が良いです。"
      }
    ];

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    let selectedQuizzes = [];
    let current = 0;
    let score = 0;
    let answered = false;

    const summaryBox = document.getElementById("summaryBox");
    const choices = document.getElementById("choices");
    const questionNo = document.getElementById("questionNo");
    const scoreEl = document.getElementById("score");
    const raceTitle = document.getElementById("raceTitle");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const explain = document.getElementById("explain");
    const nextBtn = document.getElementById("nextBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const retryBtn = document.getElementById("retryBtn");

    function setupGame() {
      selectedQuizzes = shuffle(allQuizzes).slice(0, 5);
      current = 0;
      score = 0;
      answered = false;
      rewardBtn.style.display = "none";
      retryBtn.style.display = "none";
      nextBtn.style.display = "block";
      renderQuiz();
    }

    function renderQuiz() {
      answered = false;
      resultBox.style.display = "none";

      const quiz = selectedQuizzes[current];
      questionNo.textContent = current + 1;
      scoreEl.textContent = score;
      raceTitle.textContent = `第${current + 1}問`;

      summaryBox.innerHTML = "";
      quiz.details.forEach(item => {
        const div = document.createElement("div");
        div.className = "summary-card";
        div.innerHTML = `
          <div class="summary-label">${item.label}</div>
          <div class="summary-value">${item.value}</div>
        `;
        summaryBox.appendChild(div);
      });

      choices.innerHTML = "";
      quiz.plans.forEach(plan => {
        const btn = document.createElement("button");
        btn.className = "plan-btn";
        btn.innerHTML = `
          <div class="plan-title">${plan.title}</div>
          <div class="plan-desc">${plan.desc}</div>
        `;
        btn.onclick = () => answer(plan.key);
        choices.appendChild(btn);
      });
    }

    function answer(selected) {
      if (answered) return;
      answered = true;

      const quiz = selectedQuizzes[current];
      const correct = selected === quiz.answer;
      const answerPlan = quiz.plans.find(p => p.key === quiz.answer);

      resultBox.style.display = "block";

      if (correct) {
        score++;
        scoreEl.textContent = score;
        resultBox.className = "result-box correct";
        resultTitle.textContent = "🎉 正解！";
      } else {
        resultBox.className = "result-box wrong";
        resultTitle.textContent = "❌ 不正解";
      }

      explain.textContent = `正解は「${answerPlan.title}」です。${quiz.explanation}`;

      if (current === selectedQuizzes.length - 1) {
        nextBtn.style.display = "none";
        retryBtn.style.display = "block";
        if (score >= 3) {
          rewardBtn.style.display = "block";
        } else {
          rewardBtn.style.display = "none";
        }
      } else {
        nextBtn.style.display = "block";
        retryBtn.style.display = "none";
        rewardBtn.style.display = "none";
      }
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartGame() {
      setupGame();
    }

    setupGame();
  </script>
</body>
</html>
