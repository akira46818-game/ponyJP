<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードGET!</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 90, 255, 0.35), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0, 200, 255, 0.28), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255, 0, 200, 0.22), transparent 30%),
        linear-gradient(180deg, #050816 0%, #0b1026 45%, #131a3a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 14px 32px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 22px 16px 26px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .sub {
      color: rgba(255,255,255,0.84);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .gacha-box {
      position: relative;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .capsule {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff2a6 0%, #ffd84d 45%, #ff9f1c 100%);
      box-shadow:
        0 0 30px rgba(255, 215, 80, 0.55),
        inset 0 -10px 18px rgba(0,0,0,0.14);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 56px;
      animation: float 1s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(-10px) scale(1.04); }
    }

    .loading {
      margin-top: 18px;
      font-size: 20px;
      font-weight: 800;
      color: #ffe27a;
      letter-spacing: 1px;
    }

    .dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    .flash {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 65%);
      opacity: 0;
      pointer-events: none;
    }

    .flash.show {
      animation: flashAnim 0.7s ease-out;
    }

    @keyframes flashAnim {
      0% { opacity: 0; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.08); }
      100% { opacity: 0; transform: scale(1.15); }
    }

    .result {
      display: none;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      width: 100%;
      max-width: 360px;
      border-radius: 22px;
      box-shadow: 0 0 28px rgba(255, 215, 80, 0.35);
      margin: 0 auto 16px;
      display: block;
    }

    .rarity {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #ffd84d;
      text-shadow: 0 0 14px rgba(255, 216, 77, 0.35);
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 12px auto 0;
      padding: 15px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      border: none;
      cursor: pointer;
    }

    .download {
      background: gold;
      color: black;
    }

    .line {
      background: #06C755;
      color: white;
    }

    .back {
      background: rgba(255,255,255,0.14);
      color: white;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.76);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎉 カードGET!</h1>
    <div class="sub">ゲームクリア報酬です。<br>ガチャで限定カードを獲得します！</div>

    <div class="gacha-box">
      <div id="flash" class="flash"></div>

      <div id="loadingArea">
        <div class="capsule">🎰</div>
        <div class="loading">ガチャ中<span class="dots"></span></div>
      </div>

      <div id="resultArea" class="result">
        <div id="rarity" class="rarity">SSR</div>
        <img id="cardImage" class="card" src="" alt="Reward Card">

        <a id="downloadBtn" class="btn download" href="" download>
          ⬇️ ダウンロード
        </a>

        <a class="btn line" href="https://lin.ee/zohBFsV" target="_blank" rel="noopener noreferrer">
          💬 LINEで次のレアカードGET
        </a>

        <a class="btn back" href="index.html">
          ← 一覧へ戻る
        </a>

        <div class="note">
          画像を長押しでも保存できます。<br>
          次の限定カードはLINEで配布予定です。
        </div>
      </div>
    </div>
  </div>

  <script>
    const cards = [
  { file: "lumina.jpg", rarity: "SR ✨" },
  { file: "nox.jpg", rarity: "SSR 👑" },
  { file: "flare.jpg", rarity: "SSR 🔥" },
  { file: "storm.jpg", rarity: "SSR ⚡" },
  { file: "tera.jpg", rarity: "SSR 🌿" },   // ← 修正
  { file: "stera.jpg", rarity: "SSR 💧" }, // ← 追加してもOK
  { file: "nyago.jpg", rarity: "LEGEND 🐾" },
  { file: "tespero.jpg", rarity: "BOSS ☠️" }
];
    

    const flash = document.getElementById("flash");
    const loadingArea = document.getElementById("loadingArea");
    const resultArea = document.getElementById("resultArea");
    const cardImage = document.getElementById("cardImage");
    const downloadBtn = document.getElementById("downloadBtn");
    const rarity = document.getElementById("rarity");

    // 簡易ガチャ確率
    function drawCard() {
      const roll = Math.random();

      if (roll < 0.04) return cards.find(c => c.file === "nyago.jpg") || cards[6];
      if (roll < 0.08) return cards.find(c => c.file === "tespero.jpg") || cards[7];
      if (roll < 0.22) return cards.find(c => c.file === "nox.jpg") || cards[1];
      if (roll < 0.40) return cards.find(c => c.file === "flare.jpg") || cards[2];
      if (roll < 0.58) return cards.find(c => c.file === "storm.jpg") || cards[3];
      if (roll < 0.76) return cards.find(c => c.file === "tera.jpg") || cards[4];
      if (roll < 0.92) return cards.find(c => c.file === "terra.jpg") || cards[5];
      return cards.find(c => c.file === "lumina.jpg") || cards[0];
    }

    const selected = drawCard();

    setTimeout(() => {
      flash.classList.add("show");
    }, 1800);

    setTimeout(() => {
      loadingArea.style.display = "none";
      resultArea.style.display = "block";
      cardImage.src = selected.file;
      downloadBtn.href = selected.file;
      rarity.textContent = selected.rarity;
    }, 2200);
  </script>
</body>
</html>
