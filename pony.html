<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポニージャンプ</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 90, 255, 0.25), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0, 200, 255, 0.2), transparent 25%),
        linear-gradient(180deg, #08112d 0%, #101b46 100%);
      color: #fff;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 18px 16px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    h1 {
      margin: 4px 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 14px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }

    .hud {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 800;
    }

    .hud div {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 10px 8px;
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.8) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 40% 35%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        linear-gradient(to bottom, #13204d 0%, #1f2f70 72%, #284b31 72%, #284b31 100%);
      border: 2px solid rgba(255,255,255,0.18);
    }

    .moon {
      position: absolute;
      top: 18px;
      right: 24px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffbe8 0%, #f1e7b8 70%, #d8c98b 100%);
      box-shadow: 0 0 24px rgba(255, 244, 200, 0.35);
    }

    .ground-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 58px;
      height: 4px;
      background: rgba(190,255,190,0.25);
    }

    .pony {
      position: absolute;
      left: 38px;
      bottom: 58px;
      width: 82px;
      height: 82px;
      pointer-events: none;
      z-index: 5;
    }

    .pony img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.18));
    }

    .obstacle {
      position: absolute;
      left: 450px;
      bottom: 58px;
      z-index: 4;
    }

    .obstacle.low {
      width: 34px;
      height: 54px;
      border-radius: 10px 10px 4px 4px;
      background: linear-gradient(180deg, #c5934d 0%, #8f5d27 100%);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.12);
    }

    .obstacle.high {
      width: 34px;
      height: 88px;
      border-radius: 10px 10px 4px 4px;
      background: linear-gradient(180deg, #b97aff 0%, #7a38db 100%);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.14);
    }

    .star {
      position: absolute;
      left: 450px;
      width: 30px;
      height: 30px;
      z-index: 3;
      font-size: 28px;
      line-height: 30px;
      text-align: center;
      filter: drop-shadow(0 0 8px rgba(255, 234, 92, 0.7));
    }

    .btn {
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff8a2a, #ff6f3c);
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      padding: 18px 20px;
      box-shadow: 0 10px 24px rgba(255,138,42,0.35);
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.76);
      line-height: 1.6;
    }

    .panel {
      margin-top: 16px;
      border-radius: 20px;
      padding: 18px 14px;
    }

    .start-box {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
    }

    .clear-box {
      display: none;
      background: rgba(80, 200, 120, 0.18);
    }

    .gameover-box {
      display: none;
      background: rgba(255, 90, 90, 0.16);
    }

    .title-clear,
    .title-over {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 900;
    }

    .line-btn,
    .retry-btn,
    .back-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
    }

    .line-btn {
      background: #06C755;
      color: #fff;
    }

    .retry-btn {
      background: #ff8a2a;
      color: #fff;
    }

    .back-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
      margin-left: 8px;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      z-index: 10;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐴 ポニージャンプ</h1>
    <p class="sub">
      障害物を3回よけたらクリア！<br>
      空中でもう1回押すと二段ジャンプできます。
    </p>

    <div class="hud">
      <div>クリア回数: <span id="score">0</span> / 3</div>
      <div>スター: <span id="starScore">0</span></div>
    </div>

    <div class="game-area" id="gameArea">
      <div class="moon"></div>
      <div class="pony" id="pony">
        <img src="pony.png" alt="Pony">
      </div>
      <div class="ground-line"></div>
      <div class="obstacle low" id="obstacle"></div>
      <div class="star" id="star">⭐</div>
    </div>

    <button class="btn" id="jumpBtn">ジャンプ！</button>
    <div class="info">ボタンか画面タップでジャンプします</div>

    <div class="panel start-box" id="startBox">
      障害物をよけながら、空中のスターも取ってください。<br>
      ワクワク感アップの二段ジャンプ仕様です。
    </div>

    <div class="panel clear-box" id="clearBox">
      <div class="title-clear">🎉クリア！</div>
      <div>限定プレゼントはこちら👇</div>
      <a class="line-btn" href="reward-pony-01.html">
  🎁 カードを受け取る
</a>
      </a>
      <a class="back-btn" href="index.html">一覧へ戻る</a>
    </div>

    <div class="panel gameover-box" id="gameoverBox">
      <div class="title-over">💥ゲームオーバー</div>
      <div>障害物に当たりました</div>
      <button class="retry-btn" id="retryBtn">もう一回！</button>
      <a class="back-btn" href="index.html">一覧へ戻る</a>
    </div>
  </div>

  <script>
    const pony = document.getElementById("pony");
    const obstacle = document.getElementById("obstacle");
    const star = document.getElementById("star");
    const gameArea = document.getElementById("gameArea");
    const scoreEl = document.getElementById("score");
    const starScoreEl = document.getElementById("starScore");
    const jumpBtn = document.getElementById("jumpBtn");
    const retryBtn = document.getElementById("retryBtn");
    const clearBox = document.getElementById("clearBox");
    const gameoverBox = document.getElementById("gameoverBox");
    const startBox = document.getElementById("startBox");

    const groundY = 58;
    const gravity = 0.9;
    const jumpPower1 = -13;
    const jumpPower2 = -11;

    let ponyY = groundY;
    let velocityY = 0;
    let jumpCount = 0;

    let isGameOver = false;
    let isCleared = false;
    let score = 0;
    let starScore = 0;
    let obstacleX = 450;
    let obstacleType = "low";
    let speed = 5;
    let animationId = null;

    let starX = 650;
    let starY = 130;
    let starActive = true;

    function setPonyPosition() {
      pony.style.bottom = ponyY + "px";
    }

    function jump() {
      if (isGameOver || isCleared) return;

      if (jumpCount === 0) {
        velocityY = jumpPower1;
        jumpCount = 1;
      } else if (jumpCount === 1) {
        velocityY = jumpPower2;
        jumpCount = 2;
      }
    }

    function randomObstacleType() {
      return Math.random() < 0.5 ? "low" : "high";
    }

    function applyObstacleType() {
      obstacle.classList.remove("low", "high");
      obstacle.classList.add(obstacleType);
    }

    function resetObstacle() {
      obstacleType = randomObstacleType();
      applyObstacleType();
      obstacleX = 430 + Math.random() * 140;
      obstacle.style.left = obstacleX + "px";

      if (Math.random() < 0.75) {
        starActive = true;
        starX = obstacleX + 80 + Math.random() * 60;
        starY = obstacleType === "high" ? 110 : 150;
        star.style.display = "block";
      } else {
        starActive = false;
        star.style.display = "none";
      }
    }

    function createSparkles(x, y, color = "#ffe86b", count = 10) {
      for (let i = 0; i < count; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.background = color;
        s.style.left = x + "px";
        s.style.top = y + "px";
        gameArea.appendChild(s);

        const dx = (Math.random() - 0.5) * 80;
        const dy = (Math.random() - 0.5) * 80;

        s.animate(
          [
            { transform: "translate(0,0) scale(1)", opacity: 1 },
            { transform: `translate(${dx}px, ${dy}px) scale(0.3)`, opacity: 0 }
          ],
          { duration: 600, easing: "ease-out" }
        );

        setTimeout(() => s.remove(), 600);
      }
    }

    function finishClear() {
      isCleared = true;
      clearBox.style.display = "block";
      startBox.style.display = "none";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      createSparkles(180, 80, "#fff", 18);
      createSparkles(220, 120, "#8bffcf", 18);
      if (animationId) cancelAnimationFrame(animationId);
    }

    function finishGameOver() {
      isGameOver = true;
      gameoverBox.style.display = "block";
      startBox.style.display = "none";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      if (animationId) cancelAnimationFrame(animationId);
    }

    function restartGame() {
      isGameOver = false;
      isCleared = false;
      score = 0;
      starScore = 0;
      speed = 5;
      obstacleX = 450;
      ponyY = groundY;
      velocityY = 0;
      jumpCount = 0;
      starActive = true;

      scoreEl.textContent = "0";
      starScoreEl.textContent = "0";
      setPonyPosition();
      clearBox.style.display = "none";
      gameoverBox.style.display = "none";
      startBox.style.display = "block";
      jumpBtn.disabled = false;
      jumpBtn.style.opacity = "1";

      resetObstacle();
      startLoop();
    }

    function updatePony() {
      velocityY += gravity;
      ponyY -= velocityY;

      if (ponyY < groundY) {
        ponyY = groundY;
        velocityY = 0;
        jumpCount = 0;
      }

      setPonyPosition();
    }

    function updateStar() {
      if (!starActive) return;
      starX -= speed;
      star.style.left = starX + "px";
      star.style.top = starY + "px";

      const ponyLeft = 38;
      const ponyRight = ponyLeft + 72;
      const ponyBottom = ponyY;
      const ponyTop = ponyY + 72;

      const starLeft = starX;
      const starRight = starX + 30;
      const starBottom = 300 - starY - 30;
      const starTop = 300 - starY;

      const gotStar =
        ponyRight > starLeft &&
        ponyLeft < starRight &&
        ponyTop > starBottom &&
        ponyBottom < starTop;

      if (gotStar) {
        starActive = false;
        star.style.display = "none";
        starScore++;
        starScoreEl.textContent = starScore;
        createSparkles(starX, starY, "#ffe86b", 12);
      }

      if (starX < -40) {
        starActive = false;
        star.style.display = "none";
      }
    }

    function gameLoop() {
      if (isGameOver || isCleared) return;

      updatePony();

      obstacleX -= speed;
      obstacle.style.left = obstacleX + "px";

      updateStar();

      if (obstacleX < -50) {
        score++;
        scoreEl.textContent = score;

        if (score >= 3) {
          finishClear();
          return;
        }

        speed += 0.45;
        resetObstacle();
      }

      const ponyLeft = 38;
      const ponyRight = ponyLeft + 72;
      const ponyBottom = ponyY;
      const ponyTop = ponyY + 72;

      const obstacleWidth = 34;
      const obstacleHeight = obstacleType === "high" ? 88 : 54;

      const obstacleLeft = obstacleX;
      const obstacleRight = obstacleX + obstacleWidth;
      const obstacleBottom = groundY;
      const obstacleTop = groundY + obstacleHeight;

      const hit =
        ponyRight > obstacleLeft &&
        ponyLeft < obstacleRight &&
        ponyTop > obstacleBottom &&
        ponyBottom < obstacleTop;

      if (hit) {
        finishGameOver();
        return;
      }

      animationId = requestAnimationFrame(gameLoop);
    }

    function startLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(gameLoop);
    }

    jumpBtn.addEventListener("click", jump);
    retryBtn.addEventListener("click", restartGame);
    gameArea.addEventListener("click", jump);
    gameArea.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    setPonyPosition();
    resetObstacle();
    startLoop();
  </script>
</body>
</html>
