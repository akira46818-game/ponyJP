<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポニージャンプ</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 90, 255, 0.25), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0, 200, 255, 0.2), transparent 25%),
        linear-gradient(180deg, #0b1026 0%, #141b40 100%);
      color: #fff;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 18px 16px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    h1 {
      margin: 4px 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 14px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }

    .score {
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 800;
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.8) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 40% 30%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 12%, rgba(255,255,255,0.8) 0 1px, transparent 2px),
        linear-gradient(to bottom, #13204d 0%, #1f2f70 70%, #284b31 70%, #284b31 100%);
      border: 2px solid rgba(255,255,255,0.18);
    }

    .moon {
      position: absolute;
      top: 18px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffbe8 0%, #f1e7b8 70%, #d8c98b 100%);
      box-shadow: 0 0 24px rgba(255, 244, 200, 0.35);
    }

    .ground-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 52px;
      height: 4px;
      background: rgba(190,255,190,0.25);
    }

    .pony {
      position: absolute;
      left: 42px;
      bottom: 52px;
      width: 72px;
      height: 72px;
      font-size: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .obstacle {
      position: absolute;
      left: 360px;
      bottom: 52px;
      width: 28px;
      height: 58px;
      border-radius: 8px 8px 3px 3px;
      background: linear-gradient(180deg, #c5934d 0%, #8f5d27 100%);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.12);
    }

    .btn {
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #ff8a2a;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      padding: 18px 20px;
      box-shadow: 0 10px 24px rgba(255,138,42,0.35);
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.76);
    }

    .panel {
      margin-top: 16px;
      border-radius: 20px;
      padding: 18px 14px;
    }

    .start-box {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
    }

    .clear-box {
      display: none;
      background: rgba(80, 200, 120, 0.18);
    }

    .gameover-box {
      display: none;
      background: rgba(255, 90, 90, 0.16);
    }

    .title-clear,
    .title-over {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 900;
    }

    .line-btn,
    .retry-btn,
    .back-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
    }

    .line-btn {
      background: #06C755;
      color: #fff;
    }

    .retry-btn {
      background: #ff8a2a;
      color: #fff;
    }

    .back-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐴 ポニージャンプ</h1>
    <p class="sub">障害物を3回よけたらクリア！<br>ボタンか画面タップでジャンプします。</p>

    <div class="score">クリア回数: <span id="score">0</span> / 3</div>

    <div class="game-area" id="gameArea">
      <div class="moon"></div>
      <div class="pony" id="pony">🐴</div>
      <div class="ground-line"></div>
      <div class="obstacle" id="obstacle"></div>
    </div>

    <button class="btn" id="jumpBtn">ジャンプ！</button>
    <div class="info">タイミングよく押してください</div>

    <div class="panel start-box" id="startBox">
      右から来る障害物をジャンプでよけてください。<br>
      3回成功でLINE特典に進めます。
    </div>

    <div class="panel clear-box" id="clearBox">
      <div class="title-clear">🎉クリア！</div>
      <div>限定プレゼントはこちら👇</div>
      <a class="line-btn" href="https://lin.ee/zohBFsV" target="_blank" rel="noopener noreferrer">
        🎁 LINEで受け取る
      </a>
      <a class="back-btn" href="index.html">一覧へ戻る</a>
    </div>

    <div class="panel gameover-box" id="gameoverBox">
      <div class="title-over">💥ゲームオーバー</div>
      <div>障害物に当たりました</div>
      <button class="retry-btn" id="retryBtn">もう一回！</button>
      <a class="back-btn" href="index.html">一覧へ戻る</a>
    </div>
  </div>

  <script>
    const pony = document.getElementById("pony");
    const obstacle = document.getElementById("obstacle");
    const scoreEl = document.getElementById("score");
    const jumpBtn = document.getElementById("jumpBtn");
    const retryBtn = document.getElementById("retryBtn");
    const clearBox = document.getElementById("clearBox");
    const gameoverBox = document.getElementById("gameoverBox");
    const startBox = document.getElementById("startBox");
    const gameArea = document.getElementById("gameArea");

    let isJumping = false;
    let isGameOver = false;
    let isCleared = false;
    let score = 0;
    let obstacleX = 360;
    let speed = 4;
    let animationId = null;

    function jump() {
      if (isJumping || isGameOver || isCleared) return;
      isJumping = true;

      let upCount = 0;
      let downCount = 0;
      let bottom = parseInt(window.getComputedStyle(pony).bottom, 10);

      const jumpUp = setInterval(() => {
        if (upCount >= 18) {
          clearInterval(jumpUp);

          const jumpDown = setInterval(() => {
            if (downCount >= 18) {
              clearInterval(jumpDown);
              pony.style.bottom = "52px";
              isJumping = false;
              return;
            }
            bottom -= 5;
            pony.style.bottom = bottom + "px";
            downCount++;
          }, 20);

          return;
        }

        bottom += 5;
        pony.style.bottom = bottom + "px";
        upCount++;
      }, 20);
    }

    function resetObstacle() {
      obstacleX = 360 + Math.random() * 100;
      obstacle.style.left = obstacleX + "px";
    }

    function finishClear() {
      isCleared = true;
      clearBox.style.display = "block";
      startBox.style.display = "none";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      if (animationId) cancelAnimationFrame(animationId);
    }

    function finishGameOver() {
      isGameOver = true;
      gameoverBox.style.display = "block";
      startBox.style.display = "none";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      if (animationId) cancelAnimationFrame(animationId);
    }

    function restartGame() {
      isJumping = false;
      isGameOver = false;
      isCleared = false;
      score = 0;
      speed = 4;
      obstacleX = 360;
      scoreEl.textContent = "0";
      pony.style.bottom = "52px";
      obstacle.style.left = "360px";
      clearBox.style.display = "none";
      gameoverBox.style.display = "none";
      startBox.style.display = "block";
      jumpBtn.disabled = false;
      jumpBtn.style.opacity = "1";
      startLoop();
    }

    function gameLoop() {
      if (isGameOver || isCleared) return;

      obstacleX -= speed;
      obstacle.style.left = obstacleX + "px";

      const ponyBottom = parseInt(window.getComputedStyle(pony).bottom, 10);

      if (obstacleX < -40) {
        score++;
        scoreEl.textContent = score;

        if (score >= 3) {
          finishClear();
          return;
        }

        speed += 0.35;
        resetObstacle();
      }

      const obstacleNear = obstacleX < 98 && obstacleX > 28;
      const hit = obstacleNear && ponyBottom <= 96;

      if (hit) {
        finishGameOver();
        return;
      }

      animationId = requestAnimationFrame(gameLoop);
    }

    function startLoop() {
      resetObstacle();
      animationId = requestAnimationFrame(gameLoop);
    }

    jumpBtn.addEventListener("click", jump);
    retryBtn.addEventListener("click", restartGame);
    gameArea.addEventListener("click", jump);
    gameArea.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    startLoop();
  </script>
</body>
</html>
