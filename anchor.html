<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>軸馬選びゲーム</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 220, 255, 0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 210, 120, 0.16), transparent 25%),
        linear-gradient(180deg, #102041 0%, #1a2d63 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 20px 16px 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      text-align: center;
      color: rgba(255,255,255,0.84);
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 10px 8px;
      font-weight: 700;
      font-size: 15px;
    }

    .race-box {
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .race-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .horse-list {
      display: grid;
      gap: 10px;
    }

    .horse-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 12px;
      text-align: left;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .horse-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .info-line {
      font-size: 13px;
      color: rgba(255,255,255,0.84);
      line-height: 1.6;
    }

    .result-box {
      display: none;
      margin-top: 16px;
      border-radius: 20px;
      padding: 16px 14px;
      line-height: 1.7;
    }

    .correct {
      background: rgba(60, 200, 120, 0.18);
      border: 1px solid rgba(60, 200, 120, 0.28);
    }

    .wrong {
      background: rgba(255, 90, 90, 0.16);
      border: 1px solid rgba(255, 90, 90, 0.24);
    }

    .result-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      text-align: center;
    }

    .explain {
      font-size: 15px;
      color: rgba(255,255,255,0.92);
      margin-bottom: 12px;
    }

    .next-btn, .reward-btn, .back-btn, .retry-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 10px;
      cursor: pointer;
    }

    .next-btn, .retry-btn {
      background: #06C755;
      color: #fff;
    }

    .reward-btn {
      background: gold;
      color: #1b1b1b;
      display: none;
    }

    .back-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .mini-note {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="sub">
      4頭の中から、<br>
      <b>一番軸に向いている馬</b> を選んでください。
    </div>

    <div class="topbar">
      <div class="pill">問題 <span id="questionNo">1</span> / 5</div>
      <div class="pill">正解数 <span id="score">0</span></div>
    </div>

    <div class="race-box">
      <div class="race-title" id="raceTitle">第1問</div>
      <div class="horse-list" id="horseList"></div>
    </div>

    <div id="resultBox" class="result-box">
      <div id="resultTitle" class="result-title">正解！</div>
      <div id="explain" class="explain"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
      <a class="reward-btn" id="rewardBtn" href="reward-pony-01.html">🎁 カードを受け取る</a>
      <button class="retry-btn" id="retryBtn" onclick="restartGame()" style="display:none;">もう一回遊ぶ</button>
      <a class="back-btn" href="index.html">← 一覧へ戻る</a>
    </div>

    <div class="mini-note">
      軸馬は「一番強い馬」ではなく、<br>
      「一番崩れにくい馬」を選ぶのが基本です。
    </div>
  </div>

        ],

      },
      {
        title: "第4問候補",

          { name: "ルミナ", info: "先行安定 / 距離ベスト / 近走内容上位 / 1番人気", reason: "人気でも軸にしてよいパターンです。近走安定、条件合う、先行しやすい。典型的な連軸向きです。" },
          { name: "ストーム", info: "能力は高い / でもハイペース待ち / 4番人気", reason: "" },
          { name: "テラ", info: "安定型 / ただし相手強い / 3番人気", reason: "" },

        ],

      {

          { name: "テラ", info: "とにかく崩れにくい / コース合う / 馬場も向く / 3番人気", reason: "軸馬は『1着の可能性』より『飛びにくさ』が重要です。テラは典型的な連軸向きです。" },
          { name: "フレア", info: "逃げ切りか凡走かの両極端 / 1番人気", reason: "" },

      },

        title: "第7問候補",
        horses: [
          { name: "テラ", info: "重馬場歓迎 / 安定型 / 3着内率高い / 4番人気", reason: "人気ほど派手でなくても、馬場適性込みで崩れにくいなら軸向きです。" },
          { name: "ルミナ", info: "高速馬場向き / 重は少し割引 / 2番人気", reason: "" },
          { name: "フレア", info: "逃げ型 / 道悪で粘り微妙", reason: "" },
          { name: "にゃ〜ご", info: "ヒモ候補", reason: "" }

          { name: "ステラ", info: "展開ハマれば / ハイペース待ち", reason: "" },

        ],
        answer: "アクア"

        horses: [
          { name: "ノクス", info: "人気先行 / 相手崩し向き / 1番人気", reason: "" },
          { name: "ルミナ", info: "先行安定 / 内枠 / ロスなく運べる / 2番人気", reason: "内枠先行で運びやすく、崩れにくさの面で軸向きです。" },

        ],
        answer: "ルミナ"
      },
      {

        horses: [
          { name: "テラ", info: "小回り向き / 器用 / バテにくい / 3番人気", reason: "コース適性が高く、器用で大崩れしにくいので軸に向きます。" },
          { name: "フレア", info: "ハナ必須 / 外枠 / 1番人気", reason: "" },
          { name: "ストーム", info: "直線長い方が良い", reason: "" },
          { name: "アクア", info: "差し安定だが小回りでは一歩落ちる", reason: "" }
        ],
        answer: "テラ"
      },
      {
        title: "第11問候補",
        horses: [
          { name: "アクア", info: "相手弱化 / 叩き2走目 / 安定感あり / 2番人気", reason: "条件が整っていて、派手さより安定で軸に向く理想パターンです。" },
          { name: "ノクス", info: "差し届くかどうか / 流れ待ち", reason: "" },
          { name: "フレア", info: "逃げ残り条件限定", reason: "" },
          { name: "にゃ〜ご", info: "善戦型", reason: "" }
        ],
        answer: "アクア"
      },
      {
        title: "第12問候補",
        horses: [
          { name: "ルミナ", info: "外枠でも先行可能 / 安定感高い / 1番人気", reason: "多少ロスがあっても安定して能力を出せるタイプは軸向きです。" },
          { name: "フレア", info: "外枠逃げで負荷大きい", reason: "" },
          { name: "ストーム", info: "差しハマり待ち", reason: "" },
          { name: "テラ", info: "堅実だが決め手不足", reason: "" }
        ],
        answer: "ルミナ"
      },
      {
        title: "第13問候補",
        horses: [
          { name: "テラ", info: "相手なり / 掲示板安定 / 4番人気", reason: "1着かはともかく、崩れないので馬券の中心にしやすいです。" },
          { name: "ストーム", info: "爆発型 / 2着か着外か", reason: "" },
          { name: "フレア", info: "展開に左右される", reason: "" },
          { name: "ステラ", info: "届くかどうかは展開次第", reason: "" }
        ],
        answer: "テラ"
      },
      {
        title: "第14問候補",
        horses: [
          { name: "アクア", info: "高速馬場でも堅実 / 相手弱め / 3番人気", reason: "高速馬場でも崩れず、相手関係も楽なら軸向きです。" },
          { name: "ルミナ", info: "能力高いが休み明け / 1番人気", reason: "" },
          { name: "ノクス", info: "展開が必要", reason: "" },
          { name: "にゃ〜ご", info: "ヒモ向き", reason: "" }
        ],
        answer: "アクア"
      },
      {
        title: "第15問候補",
        horses: [
          { name: "ルミナ", info: "距離ベスト / 枠良し / 近走安定 / 2番人気", reason: "距離・枠・状態が揃っている馬は、1着固定でなくても軸として信頼しやすいです。" },
          { name: "フレア", info: "ハナ争い濃厚 / 1番人気", reason: "" },
          { name: "ストーム", info: "直線一気型", reason: "" },
          { name: "テラ", info: "堅実だが切れ不足", reason: "" }
        ],
        answer: "ルミナ"
      },
      {
        title: "第16問候補",
        horses: [
          { name: "テラ", info: "内枠 / 先行型 / 崩れにくい / 3番人気", reason: "内枠先行で運びやすく、連軸向きの好条件です。" },
          { name: "ノクス", info: "差し型 / スローなら危険", reason: "" },
          { name: "フレア", info: "単騎なら怖いがリスクあり", reason: "" },
          { name: "アクア", info: "差し安定 / 相手まで", reason: "" }
        ],
        answer: "テラ"
      },
      {
        title: "第17問候補",
        horses: [
          { name: "アクア", info: "差し安定 / 相手弱く連続好走可 / 2番人気", reason: "安定して走れており、相手関係も楽。軸にしやすい王道パターンです。" },
          { name: "ストーム", info: "派手だが不安定", reason: "" },
          { name: "フレア", info: "逃げ争いあり", reason: "" },
          { name: "にゃ〜ご", info: "人気薄の善戦型", reason: "" }
        ],
        answer: "アクア"
      },
      {
        title: "第18問候補",
        horses: [
          { name: "ルミナ", info: "人気でも条件整う / 大崩れ少ない / 1番人気", reason: "人気でも、条件と安定感が揃っているなら軸にして問題ないパターンです。" },
          { name: "ノクス", info: "人気ほどではない / 2番人気", reason: "" },
          { name: "テラ", info: "安定 / 2,3着向き", reason: "" },
          { name: "ステラ", info: "展開待ち", reason: "" }
        ],
        answer: "ルミナ"
      },
      {
        title: "第19問候補",
        horses: [
          { name: "テラ", info: "道悪巧者 / バテない / 4番人気", reason: "人気はなくても条件適性込みで最も崩れにくく、軸向きです。" },
          { name: "ルミナ", info: "道悪で少し割引", reason: "" },
          { name: "フレア", info: "スピード型で馬場微妙", reason: "" },
          { name: "ストーム", info: "展開ハマり待ち", reason: "" }
        ],
        answer: "テラ"
      },
      {
        title: "第20問候補",
        horses: [
          { name: "アクア", info: "相手なりに走る / 飛びにくい / 3番人気", reason: "爆発力はなくても飛びにくいので、軸として使いやすいタイプです。" },
          { name: "フレア", info: "展開極端 / 1番人気", reason: "" },
          { name: "ノクス", info: "流れが向くか次第", reason: "" },
          { name: "にゃ〜ご", info: "押さえ候補", reason: "" }
        ],
        answer: "アクア"
      }
    ];

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    let selectedQuizzes = [];
    let current = 0;
    let score = 0;
    let answered = false;

    const horseList = document.getElementById("horseList");
    const questionNo = document.getElementById("questionNo");
    const scoreEl = document.getElementById("score");
    const raceTitle = document.getElementById("raceTitle");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const explain = document.getElementById("explain");
    const nextBtn = document.getElementById("nextBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const retryBtn = document.getElementById("retryBtn");

    function setupGame() {
      selectedQuizzes = shuffle(allQuizzes).slice(0, 5);
      current = 0;
      score = 0;
      answered = false;
      rewardBtn.style.display = "none";
      retryBtn.style.display = "none";
      nextBtn.style.display = "block";
      renderQuiz();
    }

    function renderQuiz() {
      answered = false;
      resultBox.style.display = "none";

      const quiz = selectedQuizzes[current];
      questionNo.textContent = current + 1;
      scoreEl.textContent = score;
      raceTitle.textContent = quiz.title;

      horseList.innerHTML = "";
      quiz.horses.forEach(horse => {
        const btn = document.createElement("button");
        btn.className = "horse-btn";
        btn.innerHTML = `
          <div class="horse-name">🐴 ${horse.name}</div>
          <div class="info-line">${horse.info}</div>
        `;
        btn.onclick = () => answer(horse.name);
        horseList.appendChild(btn);
      });
    }

    function answer(selectedName) {
      if (answered) return;
      answered = true;

      const quiz = selectedQuizzes[current];
      const correct = selectedName === quiz.answer;
      const answerHorse = quiz.horses.find(h => h.name === quiz.answer);

      resultBox.style.display = "block";

      if (correct) {
        score++;
        scoreEl.textContent = score;
        resultBox.className = "result-box correct";
        resultTitle.textContent = "🎉 正解！";
      } else {
        resultBox.className = "result-box wrong";
        resultTitle.textContent = "❌ 不正解";
      }

      explain.textContent = `正解は「${quiz.answer}」です。${answerHorse.reason}`;

      if (current === selectedQuizzes.length - 1) {
        nextBtn.style.display = "none";
        retryBtn.style.display = "block";
        if (score >= 3) {
          rewardBtn.style.display = "block";
        } else {
          rewardBtn.style.display = "none";
        }
      } else {
        nextBtn.style.display = "block";
        retryBtn.style.display = "none";
        rewardBtn.style.display = "none";
      }
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartGame() {
      setupGame();
    }

    setupGame();
  </script>
</body>
</html>
