<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ペース予想ゲーム</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 90, 255, 0.22), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0, 200, 255, 0.18), transparent 25%),
        linear-gradient(180deg, #0d1740 0%, #162868 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 20px 16px 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
      line-height: 1.2;
    }

    .sub {
      text-align: center;
      color: rgba(255,255,255,0.84);
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 10px 8px;
      font-weight: 700;
      font-size: 15px;
    }

    .race-box {
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .race-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .horse-list {
      display: grid;
      gap: 10px;
    }

    .horse {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 12px 12px;
    }

    .horse-name {
      font-size: 16px;
      font-weight: 700;
    }

    .style-badge {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      min-width: 68px;
      text-align: center;
    }

    .nige { background: #ff6b57; }
    .senko { background: #ff9f1c; }
    .sashi { background: #3a86ff; }
    .oikomi { background: #8338ec; }

    .choice-title {
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      margin: 16px 0 12px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      color: white;
    }

    .btn-high { background: #ff6b57; }
    .btn-middle { background: #ffb703; color: #1d1d1d; }
    .btn-slow { background: #3a86ff; }

    .result-box {
      display: none;
      margin-top: 16px;
      border-radius: 20px;
      padding: 16px 14px;
      line-height: 1.7;
    }

    .correct {
      background: rgba(60, 200, 120, 0.18);
      border: 1px solid rgba(60, 200, 120, 0.28);
    }

    .wrong {
      background: rgba(255, 90, 90, 0.16);
      border: 1px solid rgba(255, 90, 90, 0.24);
    }

    .result-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      text-align: center;
    }

    .explain {
      font-size: 15px;
      color: rgba(255,255,255,0.92);
      margin-bottom: 12px;
    }

    .next-btn, .reward-btn, .back-btn, .retry-btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 10px;
      cursor: pointer;
    }

    .next-btn, .retry-btn {
      background: #06C755;
      color: #fff;
    }

    .reward-btn {
      background: gold;
      color: #1b1b1b;
      display: none;
    }

    .back-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    .mini-note {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏇 ペース予想ゲーム</h1>
    <div class="sub">
      脚質を見て、そのレースが<br>
      <b>ハイペース・ミドルペース・スローペース</b> のどれになるか当ててください。
    </div>

    <div class="topbar">
      <div class="pill">問題 <span id="questionNo">1</span> / 5</div>
      <div class="pill">正解数 <span id="score">0</span></div>
    </div>

    <div class="race-box">
      <div class="race-title" id="raceTitle">第1レース</div>
      <div class="horse-list" id="horseList"></div>
    </div>

    <div class="choice-title">このレースのペースは？</div>

    <div class="choices" id="choices">
      <button class="btn btn-high" onclick="answer('high')">ハイペース</button>
      <button class="btn btn-middle" onclick="answer('middle')">ミドルペース</button>
      <button class="btn btn-slow" onclick="answer('slow')">スローペース</button>
    </div>

    <div id="resultBox" class="result-box">
      <div id="resultTitle" class="result-title">正解！</div>
      <div id="explain" class="explain"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
      <a class="reward-btn" id="rewardBtn" href="reward-pony-01.html">🎁 カードを受け取る</a>
      <button class="retry-btn" id="retryBtn" onclick="restartGame()" style="display:none;">もう一回遊ぶ</button>
      <a class="back-btn" href="index.html">← 一覧へ戻る</a>
    </div>

    <div class="mini-note">
      逃げ・先行が多いほど流れは速くなりやすいです。<br>
      差し・追込ばかりでは、むしろスローになりやすいです。
    </div>
  </div>

  <script>
    const allQuizzes = [
      {
        title: "レースA",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ルミナ", style: "逃げ" },
          { name: "ストーム", style: "先行" },
          { name: "アクア", style: "差し" }
        ],
        answer: "high",
        explanation: "逃げ2頭＋先行1頭で前半から主張し合いやすく、ハイペースになりやすい構成です。"
      },
      {
        title: "レースB",
        horses: [
          { name: "テラ", style: "先行" },
          { name: "アクア", style: "差し" },
          { name: "ノクス", style: "差し" },
          { name: "にゃ〜ご", style: "追込" }
        ],
        answer: "slow",
        explanation: "逃げ馬が不在で前に行きたい馬が少ないため、スローペースになりやすい形です。"
      },
      {
        title: "レースC",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "テラ", style: "先行" },
          { name: "ルミナ", style: "先行" },
          { name: "ステラ", style: "差し" }
        ],
        answer: "middle",
        explanation: "逃げ1頭で主導権は決まりやすいですが、先行2頭がいて適度に流れるのでミドル想定です。"
      },
      {
        title: "レースD",
        horses: [
          { name: "ストーム", style: "逃げ" },
          { name: "フレア", style: "逃げ" },
          { name: "ステラ", style: "先行" },
          { name: "ノクス", style: "先行" }
        ],
        answer: "high",
        explanation: "逃げ2頭、先行2頭で前の争いが激しくなり、かなり速い流れになりやすいです。"
      },
      {
        title: "レースE",
        horses: [
          { name: "アクア", style: "差し" },
          { name: "ノクス", style: "差し" },
          { name: "にゃ〜ご", style: "追込" },
          { name: "ステラ", style: "追込" }
        ],
        answer: "slow",
        explanation: "前へ行く馬がいないので、差し・追込ばかりではスローペースになりやすいです。"
      },
      {
        title: "レースF",
        horses: [
          { name: "ルミナ", style: "逃げ" },
          { name: "フレア", style: "先行" },
          { name: "テラ", style: "差し" },
          { name: "アクア", style: "追込" }
        ],
        answer: "middle",
        explanation: "逃げ1頭で落ち着きやすいですが、先行馬もいて極端なスローにはなりにくく、ミドル想定です。"
      },
      {
        title: "レースG",
        horses: [
          { name: "ノクス", style: "逃げ" },
          { name: "ストーム", style: "先行" },
          { name: "ルミナ", style: "先行" },
          { name: "フレア", style: "先行" }
        ],
        answer: "high",
        explanation: "逃げ1頭に先行3頭で前の圧が強く、かなり流れやすい構成です。"
      },
      {
        title: "レースH",
        horses: [
          { name: "テラ", style: "差し" },
          { name: "ステラ", style: "差し" },
          { name: "にゃ〜ご", style: "追込" },
          { name: "アクア", style: "先行" }
        ],
        answer: "slow",
        explanation: "前に行くのが先行1頭だけなら楽に運べるので、全体としてはスロー寄りです。"
      },
      {
        title: "レースI",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ルミナ", style: "差し" },
          { name: "テラ", style: "差し" },
          { name: "ノクス", style: "追込" }
        ],
        answer: "slow",
        explanation: "逃げは1頭だけで競り合いも少なく、後ろが多いのでスローペースになりやすいです。"
      },
      {
        title: "レースJ",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ストーム", style: "逃げ" },
          { name: "ルミナ", style: "先行" },
          { name: "テラ", style: "追込" }
        ],
        answer: "high",
        explanation: "逃げ2頭で前半の主張が激しく、かなり速い流れになりやすい構成です。"
      },
      {
        title: "レースK",
        horses: [
          { name: "アクア", style: "先行" },
          { name: "にゃ〜ご", style: "先行" },
          { name: "ステラ", style: "差し" },
          { name: "ノクス", style: "追込" }
        ],
        answer: "middle",
        explanation: "逃げ不在で超ハイにはなりませんが、先行2頭である程度流れるためミドル想定です。"
      },
      {
        title: "レースL",
        horses: [
          { name: "ルミナ", style: "追込" },
          { name: "ストーム", style: "追込" },
          { name: "ステラ", style: "差し" },
          { name: "テラ", style: "差し" }
        ],
        answer: "slow",
        explanation: "前に行く馬が全くいないので、ほぼ確実にスロー寄りです。"
      },
      {
        title: "レースM",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ルミナ", style: "先行" },
          { name: "アクア", style: "先行" },
          { name: "ノクス", style: "差し" }
        ],
        answer: "middle",
        explanation: "逃げ1頭＋先行2頭で流れは作られますが、激しい競りではなくミドル想定です。"
      },
      {
        title: "レースN",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ストーム", style: "先行" },
          { name: "ステラ", style: "先行" },
          { name: "にゃ〜ご", style: "先行" }
        ],
        answer: "high",
        explanation: "前に行く馬が4頭でポジション争いが厳しく、ハイペース寄りです。"
      },
      {
        title: "レースO",
        horses: [
          { name: "テラ", style: "先行" },
          { name: "アクア", style: "追込" },
          { name: "ノクス", style: "追込" },
          { name: "ステラ", style: "差し" }
        ],
        answer: "slow",
        explanation: "テラが単騎気味に運べそうで、全体的には落ち着いたスローになりやすいです。"
      },
      {
        title: "レースP",
        horses: [
          { name: "ルミナ", style: "逃げ" },
          { name: "フレア", style: "逃げ" },
          { name: "アクア", style: "先行" },
          { name: "ステラ", style: "差し" }
        ],
        answer: "high",
        explanation: "逃げ2頭に先行1頭なので、前半から速くなる可能性が高いです。"
      },
      {
        title: "レースQ",
        horses: [
          { name: "にゃ〜ご", style: "先行" },
          { name: "ルミナ", style: "差し" },
          { name: "テラ", style: "差し" },
          { name: "ストーム", style: "追込" }
        ],
        answer: "slow",
        explanation: "前に行く馬がほぼ1頭だけなら淡々と流れやすく、スローペース想定です。"
      },
      {
        title: "レースR",
        horses: [
          { name: "フレア", style: "逃げ" },
          { name: "ノクス", style: "先行" },
          { name: "アクア", style: "先行" },
          { name: "ステラ", style: "追込" }
        ],
        answer: "middle",
        explanation: "逃げ1頭＋先行2頭である程度流れますが、極端なハイまでは行きにくくミドル想定です。"
      },
      {
        title: "レースS",
        horses: [
          { name: "ストーム", style: "逃げ" },
          { name: "ルミナ", style: "逃げ" },
          { name: "フレア", style: "先行" },
          { name: "ノクス", style: "追込" }
        ],
        answer: "high",
        explanation: "逃げ2頭がいる時点で主導権争いが起きやすく、ハイペース寄りになります。"
      },
      {
        title: "レースT",
        horses: [
          { name: "アクア", style: "差し" },
          { name: "ステラ", style: "差し" },
          { name: "テラ", style: "先行" },
          { name: "にゃ〜ご", style: "追込" }
        ],
        answer: "slow",
        explanation: "先行馬が1頭で差し・追込が多い形なので、前半は落ち着きやすくスロー想定です。"
      }
    ];

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    let selectedQuizzes = [];
    let current = 0;
    let score = 0;
    let answered = false;

    const horseList = document.getElementById("horseList");
    const questionNo = document.getElementById("questionNo");
    const scoreEl = document.getElementById("score");
    const raceTitle = document.getElementById("raceTitle");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const explain = document.getElementById("explain");
    const nextBtn = document.getElementById("nextBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const retryBtn = document.getElementById("retryBtn");
    const choices = document.getElementById("choices");

    function styleClass(style) {
      if (style === "逃げ") return "nige";
      if (style === "先行") return "senko";
      if (style === "差し") return "sashi";
      return "oikomi";
    }

    function setupGame() {
      selectedQuizzes = shuffle(allQuizzes).slice(0, 5);
      current = 0;
      score = 0;
      answered = false;
      rewardBtn.style.display = "none";
      retryBtn.style.display = "none";
      nextBtn.style.display = "block";
      renderRace();
    }

    function renderRace() {
      answered = false;
      resultBox.style.display = "none";
      choices.style.display = "grid";

      const race = selectedQuizzes[current];
      questionNo.textContent = current + 1;
      scoreEl.textContent = score;
      raceTitle.textContent = race.title;

      horseList.innerHTML = "";
      race.horses.forEach(horse => {
        const div = document.createElement("div");
        div.className = "horse";
        div.innerHTML = `
          <div class="horse-name">🐴 ${horse.name}</div>
          <div class="style-badge ${styleClass(horse.style)}">${horse.style}</div>
        `;
        horseList.appendChild(div);
      });
    }

    function answer(selected) {
      if (answered) return;
      answered = true;

      const race = selectedQuizzes[current];
      const correct = selected === race.answer;

      resultBox.style.display = "block";
      choices.style.display = "none";

      if (correct) {
        score++;
        scoreEl.textContent = score;
        resultBox.className = "result-box correct";
        resultTitle.textContent = "🎉 正解！";
      } else {
        resultBox.className = "result-box wrong";
        resultTitle.textContent = "❌ 不正解";
      }

      let paceText = "";
      if (race.answer === "high") paceText = "正解は ハイペース";
      if (race.answer === "middle") paceText = "正解は ミドルペース";
      if (race.answer === "slow") paceText = "正解は スローペース";

      explain.textContent = `${paceText}。${race.explanation}`;

      if (current === selectedQuizzes.length - 1) {
        nextBtn.style.display = "none";
        retryBtn.style.display = "block";
        if (score >= 3) {
          rewardBtn.style.display = "block";
        } else {
          rewardBtn.style.display = "none";
        }
      } else {
        nextBtn.style.display = "block";
        retryBtn.style.display = "none";
        rewardBtn.style.display = "none";
      }
    }

    function nextQuestion() {
      current++;
      renderRace();
    }

    function restartGame() {
      setupGame();
    }

    setupGame();
  </script>
</body>
</html>
