<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にゃ〜ごのどっちがはやい？</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Sans", sans-serif;
  background: linear-gradient(#a0e9ff, #caffbf);
  text-align: center;
}

h1 {
  margin-top: 20px;
  color: #0f5132;
}

.nyago {
  font-size: 80px;
  margin-top: 10px;
}

.speech {
  background: white;
  display: inline-block;
  padding: 12px 20px;
  border-radius: 20px;
  margin-top: 10px;
  font-size: 20px;
}

.card {
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 20px;
  max-width: 500px;
}

.question {
  font-size: 24px;
  margin-bottom: 10px;
}

.horses {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
  gap: 10px;
}

.horse {
  width: 45%;
  padding: 20px;
  border-radius: 20px;
  background: #f0f0f0;
  font-size: 22px;
  cursor: pointer;
}

.horse:hover {
  background: gold;
}

.result {
  font-size: 26px;
  margin-top: 20px;
}

.score {
  margin-top: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>🐱 にゃ〜ごのクイズ</h1>

<div class="nyago">🐱</div>
<div class="speech" id="nyagoText">はやいおうまはどっち？</div>

<div class="card">

  <div class="question" id="question">どっちがはやい？</div>

  <div class="horses">
    <div class="horse" onclick="answer(0)" id="horse1">A</div>
    <div class="horse" onclick="answer(1)" id="horse2">B</div>
  </div>

  <div class="result" id="result"></div>
  <div class="score">せいかい: <span id="score">0</span></div>

</div>

<script>
let score = 0;
let correct = 0;

const nyagoLines = [
  "はやいおうまはどっち？",
  "よーくみてね！",
  "かんたんだよ！",
  "どっちかな〜？"
];

function newQuestion() {

  correct = Math.floor(Math.random() * 2);

  if (correct === 0) {
    horse1.innerText = "⚡🐎 はやい！";
    horse2.innerText = "🐢 おそい";
  } else {
    horse1.innerText = "🐢 おそい";
    horse2.innerText = "⚡🐎 はやい！";
  }

  document.getElementById("result").innerText = "";

  // にゃ〜ごのセリフ変化
  const randomLine = nyagoLines[Math.floor(Math.random() * nyagoLines.length)];
  document.getElementById("nyagoText").innerText = randomLine;
}

function answer(choice) {

  if (choice === correct) {
    document.getElementById("result").innerText = "⭕ すごい！";
    score++;
  } else {
    document.getElementById("result").innerText = "❌ ちがうよ〜";
  }

  document.getElementById("score").innerText = score;

  setTimeout(newQuestion, 1000);
}

newQuestion();
</script>

</body>
</html>
