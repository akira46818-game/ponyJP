<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pony Jump Party - Final Goal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: manipulation; }
        .pony {
            font-size: 65px;
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scaleX(-1);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }
        /* 走る時の足の動き（全身の伸縮） */
        .running { animation: pony-gallop 0.25s infinite alternate; }
        @keyframes pony-gallop {
            from { transform: scaleX(-1) scaleY(1); }
            to { transform: scaleX(-1) scaleY(0.8) translateY(8px); }
        }
        .jumping { transform: scaleX(-1) scaleY(1.3) translateY(-15px); }
        .bg-grass { background: linear-gradient(to bottom, #4ade80 0%, #22c55e 100%); }
        .goal-text { animation: rainbow 2s infinite; }
        @keyframes rainbow {
            0% { color: #ff0000; } 25% { color: #ffcf00; } 50% { color: #00ff00; } 75% { color: #0000ff; } 100% { color: #ff0000; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Game = () => {
            const [ponyY, setPonyY] = useState(0);
            const [velocity, setVelocity] = useState(0);
            const [jumpCount, setJumpCount] = useState(0);
            const [timeLeft, setTimeLeft] = useState(90); // 1分30秒のカウントダウン
            const [isGameOver, setIsGameOver] = useState(false);
            const [isGoal, setIsGoal] = useState(false);
            const [obstacles, setObstacles] = useState([]);
            
            const GROUND_Y = 0;
            const GRAVITY = -0.7;
            const JUMP_FORCE = 13;

            const handleAction = useCallback(() => {
                if (isGameOver || isGoal) {
                    location.reload();
                    return;
                }
                if (jumpCount < 2) {
                    setVelocity(JUMP_FORCE);
                    setJumpCount(prev => prev + 1);
                }
            }, [jumpCount, isGameOver, isGoal]);

            // 入力イベント
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleAction(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleAction]);

            // ゲームループ
            useEffect(() => {
                if (isGameOver || isGoal) return;
                const interval = setInterval(() => {
                    setPonyY(y => {
                        const nextY = y + velocity;
                        if (nextY <= GROUND_Y) {
                            setJumpCount(0);
                            setVelocity(0);
                            return GROUND_Y;
                        }
                        return nextY;
                    });
                    setVelocity(v => v + GRAVITY);

                    setObstacles(obs => {
                        const newObs = obs.map(o => ({ ...o, x: o.x - 7 })).filter(o => o.x > -100);
                        newObs.forEach(o => {
                            // 当たり判定 (馬の位置が右に寄ったので判定も調整)
                            if (o.x > 140 && o.x < 200 && ponyY < o.height) {
                                setIsGameOver(true);
                            }
                        });
                        return newObs;
                    });
                }, 20);
                return () => clearInterval(interval);
            }, [velocity, isGameOver, isGoal, ponyY]);

            // カウントダウンとクリア判定
            useEffect(() => {
                if (isGameOver || isGoal) return;
                const timer = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            setIsGoal(true);
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isGameOver, isGoal]);

            // 障害物生成
            useEffect(() => {
                if (isGameOver || isGoal) return;
                const spawn = () => {
                    const height = Math.random() > 0.6 ? 70 : 40;
                    setObstacles(prev => [...prev, { x: window.innerWidth, height, id: Date.now() }]);
                    setTimeout(spawn, 1200 + Math.random() * 1800);
                };
                setTimeout(spawn, 1000);
            }, [isGameOver, isGoal]);

            return (
                <div className="relative w-screen h-screen overflow-hidden select-none" onMouseDown={handleAction} ontouchstart={handleAction}>
                    {/* タイマー表示 */}
                    <div className="absolute top-10 w-full text-center">
                        <div className="text-white text-3xl font-bold opacity-80 mb-2">GOAL UNTIL...</div>
                        <h1 className="text-white text-7xl font-black drop-shadow-lg tracking-widest">{timeLeft}s</h1>
                    </div>

                    {/* 背景 */}
                    <div className="absolute bottom-32 w-full flex justify-around opacity-30 pointer-events-none">
                        <span className="text-[120px]">⛰️</span>
                        <span className="text-[180px]">⛰️</span>
                    </div>

                    {/* 芝生 */}
                    <div className="absolute bottom-0 w-full h-32 bg-grass border-t-8 border-green-700"></div>

                    {/* 全身ポニー (位置を少し右に移動) */}
                    <div 
                        className={`pony absolute left-[150px] transition-all ${ponyY > 0 ? 'jumping' : 'running'}`}
                        style={{ bottom: `${128 + ponyY}px` }}
                    >
                        {isGameOver ? '😵' : (isGoal ? '🦄👑' : '🦄')}
                    </div>

                    {/* ハードル */}
                    {obstacles.map(o => (
                        <div 
                            key={o.id}
                            className="absolute flex items-end justify-center bg-red-600 border-2 border-white rounded-sm"
                            style={{ left: `${o.x}px`, bottom: '128px', width: '45px', height: `${o.height}px` }}
                        >
                            <div className="w-full h-2 bg-white mb-2 opacity-50"></div>
                        </div>
                    ))}

                    {/* ゲームオーバー画面 */}
                    {isGameOver && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center">
                            <div className="bg-white p-8 rounded-3xl text-center">
                                <h2 className="text-4xl font-bold text-red-500 mb-4">Try Again!</h2>
                                <button className="bg-pink-500 text-white px-8 py-3 rounded-full text-xl font-bold">Retry</button>
                            </div>
                        </div>
                    )}

                    {/* ゴール画面 */}
                    {isGoal && (
                        <div className="absolute inset-0 bg-white/40 backdrop-blur-md flex flex-col items-center justify-center">
                            <div className="text-center p-10 bg-white rounded-[50px] shadow-2xl scale-125 border-8 border-pink-200">
                                <h2 className="text-6xl font-black goal-text mb-4">GOAL!! 🎉</h2>
                                <p className="text-2xl font-bold text-pink-500 mb-6">Congratulations!</p>
                                <button className="bg-pink-500 text-white px-10 py-4 rounded-full text-2xl font-bold">Play Again</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Game />);
    </script>
</body>
</html>
