<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポニーゲーム</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", sans-serif;
      background: #dfeaf5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      background: #f7f7f7;
      border-radius: 28px;
      padding: 20px 16px 24px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: 42px;
      color: #1f274a;
      letter-spacing: 1px;
    }

    .sub {
      margin: 0 0 16px;
      color: #6c7388;
      font-size: 16px;
    }

    .score {
      font-size: 18px;
      font-weight: 700;
      color: #2b355d;
      margin-bottom: 12px;
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 260px;
      background: linear-gradient(to bottom, #dff1ff 0%, #dff1ff 72%, #d4efc7 72%, #d4efc7 100%);
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid #ffffff;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
    }

    .pony {
      position: absolute;
      left: 42px;
      bottom: 52px;
      width: 70px;
      height: 70px;
      font-size: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .obstacle {
      position: absolute;
      bottom: 52px;
      right: -40px;
      width: 28px;
      height: 58px;
      background: #8b5a2b;
      border-radius: 8px 8px 2px 2px;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
    }

    .ground-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 52px;
      height: 4px;
      background: rgba(60, 110, 40, 0.25);
    }

    .btn {
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #ee7f2f;
      color: white;
      font-size: 30px;
      font-weight: 800;
      padding: 20px 20px;
      box-shadow: 0 10px 22px rgba(238, 127, 47, 0.28);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .info {
      margin-top: 12px;
      color: #5f6475;
      font-size: 14px;
    }

    .clear-box,
    .gameover-box,
    .start-box {
      margin-top: 18px;
      border-radius: 22px;
      padding: 20px 16px;
    }

    .start-box {
      background: #eef5ff;
      color: #2b355d;
    }

    .clear-box {
      display: none;
      background: #edf8e8;
    }

    .gameover-box {
      display: none;
      background: #fff0f0;
    }

    .clear-title {
      margin: 0 0 10px;
      color: #2f7d32;
      font-size: 30px;
      font-weight: 900;
    }

    .gameover-title {
      margin: 0 0 10px;
      color: #c03b3b;
      font-size: 30px;
      font-weight: 900;
    }

    .line-btn,
    .retry-btn {
      display: inline-block;
      margin-top: 14px;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .line-btn {
      background: #56bf55;
      color: #fff;
    }

    .retry-btn {
      background: #ee7f2f;
      color: #fff;
    }

    .small {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐴 ポニーゲーム</h1>
    <p class="sub">障害物を3回よけたらクリア！</p>

    <div class="score">クリア回数: <span id="score">0</span> / 3</div>

    <div class="game-area" id="gameArea">
      <div class="pony" id="pony">🐴</div>
      <div class="ground-line"></div>
      <div class="obstacle" id="obstacle"></div>
    </div>

    <button class="btn" id="jumpBtn">ジャンプ！</button>
    <div class="info">ボタンを押すか、画面タップでジャンプします</div>

    <div class="start-box" id="startBox">
      右からくる障害物をジャンプでよけてください
      <div class="small">3回成功でLINEプレゼントに進めます</div>
    </div>

    <div class="clear-box" id="clearBox">
      <div class="clear-title">🎉クリア！</div>
      <div>限定プレゼントはこちら👇</div>
      <a class="line-btn" href="https://lin.ee/zohBFsV" target="_blank" rel="noopener noreferrer">
  🎁 LINEで受け取る
</a>
      </a>
    </div>

    <div class="gameover-box" id="gameoverBox">
      <div class="gameover-title">💥ゲームオーバー</div>
      <div>障害物に当たりました</div>
      <button class="retry-btn" id="retryBtn">もう一回！</button>
    </div>
  </div>

  <script>
    const pony = document.getElementById("pony");
    const obstacle = document.getElementById("obstacle");
    const scoreEl = document.getElementById("score");
    const jumpBtn = document.getElementById("jumpBtn");
    const retryBtn = document.getElementById("retryBtn");
    const clearBox = document.getElementById("clearBox");
    const gameoverBox = document.getElementById("gameoverBox");
    const startBox = document.getElementById("startBox");
    const gameArea = document.getElementById("gameArea");

    let isJumping = false;
    let isGameOver = false;
    let isCleared = false;
    let score = 0;
    let obstacleX = 340;
    let speed = 4;
    let animationId = null;

    function jump() {
      if (isJumping || isGameOver || isCleared) return;
      isJumping = true;

      let upCount = 0;
      let downCount = 0;
      let bottom = 52;

      const jumpUp = setInterval(() => {
        if (upCount >= 18) {
          clearInterval(jumpUp);

          const jumpDown = setInterval(() => {
            if (downCount >= 18) {
              clearInterval(jumpDown);
              pony.style.bottom = "52px";
              isJumping = false;
              return;
            }
            bottom -= 5;
            pony.style.bottom = bottom + "px";
            downCount++;
          }, 20);

          return;
        }

        bottom += 5;
        pony.style.bottom = bottom + "px";
        upCount++;
      }, 20);
    }

    function resetObstacle() {
      obstacleX = 340 + Math.random() * 80;
      obstacle.style.right = (340 - obstacleX) * -1 + "px";
    }

    function finishClear() {
      isCleared = true;
      clearBox.style.display = "block";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      cancelAnimationFrame(animationId);
    }

    function finishGameOver() {
      isGameOver = true;
      gameoverBox.style.display = "block";
      jumpBtn.disabled = true;
      jumpBtn.style.opacity = "0.6";
      cancelAnimationFrame(animationId);
    }

    function restartGame() {
      isGameOver = false;
      isCleared = false;
      isJumping = false;
      score = 0;
      speed = 4;
      obstacleX = 340;
      scoreEl.textContent = "0";
      pony.style.bottom = "52px";
      obstacle.style.right = "-40px";
      clearBox.style.display = "none";
      gameoverBox.style.display = "none";
      startBox.style.display = "block";
      jumpBtn.disabled = false;
      jumpBtn.style.opacity = "1";
      startLoop();
    }

    function gameLoop() {
      if (isGameOver || isCleared) return;

      obstacleX -= speed;
      obstacle.style.left = obstacleX + "px";

      const ponyBottom = parseInt(window.getComputedStyle(pony).bottom, 10);

      if (obstacleX < -40) {
        score++;
        scoreEl.textContent = score;
        if (score >= 3) {
          finishClear();
          return;
        }
        speed += 0.4;
        resetObstacle();
      }

      const obstacleNear = obstacleX < 95 && obstacleX > 30;
      const hit = obstacleNear && ponyBottom <= 95;

      if (hit) {
        finishGameOver();
        return;
      }

      animationId = requestAnimationFrame(gameLoop);
    }

    function startLoop() {
      resetObstacle();
      animationId = requestAnimationFrame(gameLoop);
    }

    jumpBtn.addEventListener("click", jump);
    retryBtn.addEventListener("click", restartGame);

    gameArea.addEventListener("touchstart", function(e) {
      e.preventDefault();
      jump();
    }, { passive: false });

    gameArea.addEventListener("click", jump);

    startLoop();
  </script>
</body>
</html>
