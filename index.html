<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pony Jump Party - Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: manipulation; }
        
        .pony-container {
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; 
            background: transparent;
        }

        /* ポニーのサイズを100pxに小さく調整 */
        .pony-image {
            width: 100px; 
            height: auto;
            display: block;
        }

        .running { animation: pony-gallop 0.2s infinite alternate; }
        @keyframes pony-gallop {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.9) translateY(5px); }
        }
        .jumping { transform: scaleY(1.1) translateY(-10px) rotate(-5deg); }

        .bg-grass { background: linear-gradient(to bottom, #4ade80 0%, #22c55e 100%); }
        .goal-text { animation: rainbow 2s infinite; font-weight: 900; }
        @keyframes rainbow {
            0% { color: #ff0000; } 25% { color: #ffcf00; } 50% { color: #00ff00; } 75% { color: #0000ff; } 100% { color: #ff0000; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const Game = () => {
            const [ponyY, setPonyY] = useState(0);
            const [velocity, setVelocity] = useState(0);
            const [jumpCount, setJumpCount] = useState(0);
            const [timeLeft, setTimeLeft] = useState(90);
            const [isGameOver, setIsGameOver] = useState(false);
            const [isGoal, setIsGoal] = useState(false);
            const [obstacles, setObstacles] = useState([]);

            const GROUND_Y = 0;
            const GRAVITY = -0.7;
            const JUMP_FORCE = 13;

            const handleAction = useCallback(() => {
                if (isGameOver || isGoal) { location.reload(); return; }
                if (jumpCount < 2) {
                    setVelocity(JUMP_FORCE);
                    setJumpCount(prev => prev + 1);
                }
            }, [jumpCount, isGameOver, isGoal]);

            useEffect(() => {
                const handleKeyDown = (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleAction(); };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleAction]);

            useEffect(() => {
                if (isGameOver || isGoal) return;
                const interval = setInterval(() => {
                    setPonyY(y => {
                        const nextY = y + velocity;
                        if (nextY <= GROUND_Y) { setJumpCount(0); setVelocity(0); return GROUND_Y; }
                        return nextY;
                    });
                    setVelocity(v => v + GRAVITY);

                    setObstacles(obs => {
                        const newObs = obs.map(o => ({ ...o, x: o.x - 8 })).filter(o => o.x > -100);
                        // 当たり判定を小さいポニーに合わせて調整
                        const ponyPos = window.innerWidth / 2 - 50;
                        newObs.forEach(o => {
                            if (o.x > ponyPos && o.x < ponyPos + 50 && ponyY < o.height) {
                                setIsGameOver(true);
                            }
                        });
                        return newObs;
                    });
                }, 20);
                return () => clearInterval(interval);
            }, [velocity, isGameOver, isGoal, ponyY]);

            useEffect(() => {
                if (isGameOver || isGoal) return;
                const timer = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            setIsGoal(true);
                            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [isGameOver, isGoal]);

            useEffect(() => {
                if (isGameOver || isGoal) return;
                const spawn = () => {
                    const height = Math.random() > 0.6 ? 70 : 40;
                    setObstacles(prev => [...prev, { x: window.innerWidth, height, id: Date.now() }]);
                    setTimeout(spawn, 1200 + Math.random() * 2000);
                };
                setTimeout(spawn, 1000);
            }, [isGameOver, isGoal]);

            return (
                <div className="relative w-screen h-screen overflow-hidden select-none" onMouseDown={handleAction} onTouchStart={handleAction}>
                    <div className="absolute top-10 w-full text-center">
                        <div className="text-white text-xl font-bold opacity-80">GOAL IN...</div>
                        <h1 className="text-white text-6xl font-black drop-shadow-lg">{timeLeft}s</h1>
                    </div>

                    <div className="absolute bottom-0 w-full h-32 bg-grass border-t-8 border-green-700"></div>

                    <div 
                        className={`pony-container absolute transition-all ${ponyY > 0 ? 'jumping' : 'running'}`}
                        style={{ 
                            bottom: `${128 + ponyY}px`,
                            left: `calc(50vw - 50px)`
                        }}
                    >
                        <img 
                            src="pony.png" 
                            className="pony-image"
                            alt="Pony"
                        />
                    </div>

                    {obstacles.map(o => (
                        <div 
                            key={o.id}
                            className="absolute bg-red-600 border-4 border-white rounded-lg"
                            style={{ left: `${o.x}px`, bottom: '128px', width: '40px', height: `${o.height}px` }}
                        />
                    ))}

                    {(isGameOver || isGoal) && (
                        <div className="absolute inset-0 bg-white/40 backdrop-blur-md flex items-center justify-center">
                            <div className="bg-white p-12 rounded-[50px] shadow-2xl text-center border-8 border-pink-200">
                                <h2 className="text-5xl font-black mb-6 goal-text uppercase">
                                    {isGoal ? "Clear! 🎉" : "Oops! 😵"}
                                </h2>
                                <button className="bg-pink-500 text-white px-12 py-4 rounded-full text-2xl font-bold">
                                    RETRY
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Game />);
    </script>
</body>
</html>
