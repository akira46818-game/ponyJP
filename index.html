<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポニーゲーム</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", sans-serif;
      background: #eaf6ff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 40px;
      margin: 0 0 12px;
      color: #1f2a44;
    }

    p {
      font-size: 18px;
      color: #5b6475;
      margin: 0 0 28px;
    }

    button {
      appearance: none;
      border: none;
      background: #ff7a00;
      color: white;
      font-size: 32px;
      font-weight: 700;
      border-radius: 999px;
      padding: 20px 28px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 122, 0, 0.28);
    }

    button:active {
      transform: scale(0.98);
    }

    #clearBox {
      display: none;
      margin-top: 28px;
      padding: 20px;
      background: #f6fff3;
      border-radius: 18px;
    }

    #clearBox h2 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #1d7a2f;
    }

    .line-btn {
      display: inline-block;
      margin-top: 12px;
      background: #19b84a;
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      padding: 14px 22px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐴 ポニーゲーム</h1>
    <p>ジャンプ成功でクリア！</p>

    <button onclick="jumpGame()">ジャンプ！</button>

    <div id="clearBox" style="display:none;">
      <h2>🎉クリア！</h2>
      <div>限定プレゼントはこちら👇</div>
      <a class="line-btn" href="https://lin.ee/あなたのLINE" target="_blank" rel="noopener noreferrer">
        🎁 LINEで受け取る
      </a>
    </div>
  </div>

  <script>
    function jumpGame() {
      const success = Math.random() < 0.5;
      const clearBox = document.getElementById("clearBox");

      if (success) {
        clearBox.style.display = "block";
      } else {
        alert("失敗！もう一回！");
      }
    }
  </script>
</body>
</html>
