<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pony 70 Games Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Comic Sans MS', sans-serif; touch-action: manipulation; }
        .bg-grass { background: linear-gradient(to bottom, #4ade80 0%, #22c55e 100%); }
        .running { animation: pony-run 0.3s infinite alternate ease-in-out; }
        @keyframes pony-run { from { transform: scale(1.0) rotate(2deg); } to { transform: scale(0.95, 1.05) rotate(-2deg); } }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.7; filter: blur(3px); pointer-events: none; }
        .sparkle { position: absolute; pointer-events: none; animation: sparkle-fade 0.6s forwards; }
        @keyframes sparkle-fade { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-20px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 共通：雲の背景 ---
        const CloudBackground = () => {
            const [clouds, setClouds] = useState([
                { id: 1, x: 100, y: 50, s: 1 }, { id: 2, x: 400, y: 120, s: 0.8 }, { id: 3, x: 800, y: 80, s: 1.2 }
            ]);
            useEffect(() => {
                const i = setInterval(() => {
                    setClouds(prev => prev.map(c => ({ ...c, x: c.x < -200 ? window.innerWidth + 100 : c.x - 0.5 })));
                }, 30);
                return () => clearInterval(i);
            }, []);
            return clouds.map(c => (
                <div key={c.id} className="cloud" style={{ left: c.x, top: c.y, width: 100*c.s, height: 40*c.s }}></div>
            ));
        };

        // --- 1. ジャンプゲーム ---
        const JumpGame = ({ onBack }) => {
            const [y, setY] = useState(0);
            const [v, setV] = useState(0);
            const [jumps, setJumps] = useState(0);
            const [obs, setObs] = useState([]);
            const [over, setOver] = useState(false);
            const [sparkles, setSparkles] = useState([]);

            const jump = () => {
                if (over) return;
                if (jumps < 2) {
                    setV(13);
                    setJumps(j => j + 1);
                    const s = { id: Date.now(), x: window.innerWidth/2 - 40, y: window.innerHeight - 180 - y };
                    setSparkles(p => [...p, s]);
                    setTimeout(() => setSparkles(p => p.filter(x => x.id !== s.id)), 600);
                }
            };

            useEffect(() => {
                const i = setInterval(() => {
                    if (over) return;
                    setY(currY => {
                        const nextY = currY + v;
                        if (nextY <= 0) { setJumps(0); setV(0); return 0; }
                        return nextY;
                    });
                    setV(currV => currV - 0.6);
                    setObs(prev => {
                        const next = prev.map(o => ({ ...o, x: o.x - 8 })).filter(o => o.x > -100);
                        next.forEach(o => {
                            if (o.x > window.innerWidth/2-80 && o.x < window.innerWidth/2 && y < o.h) setOver(true);
                        });
                        return next;
                    });
                }, 20);
                return () => clearInterval(i);
            }, [v, over, y]);

            useEffect(() => {
                if (over) return;
                const i = setInterval(() => {
                    setObs(p => [...p, { id: Date.now(), x: window.innerWidth, h: Math.random() > 0.5 ? 70 : 45 }]);
                }, 1500);
                return () => clearInterval(i);
            }, [over]);

            return (
                <div className="w-screen h-screen bg-[#87CEEB] relative overflow-hidden" onMouseDown={jump}>
                    <CloudBackground />
                    <button onClick={onBack} className="absolute top-4 right-4 bg-black/30 text-white px-4 py-2 rounded-full z-50">EXIT</button>
                    <div className="absolute bottom-0 w-full h-32 bg-grass border-t-4 border-green-600"></div>
                    <div className={`absolute ${y > 0 ? '' : 'running'}`} style={{ bottom: 128 + y, left: 'calc(50vw - 90px)' }}>
                        <img src="pony.png" style={{ width: '180px' }} />
                    </div>
                    {obs.map(o => <div key={o.id} className="absolute bg-pink-400 border-2 border-white rounded" style={{ left: o.x, bottom: 128, width: 40, height: o.h }}></div>)}
                    {sparkles.map(s => <div key={s.id} className="sparkle text-3xl" style={{ left: s.x, top: s.y }}>✨</div>)}
                    {over && <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-50"><div className="bg-white p-10 rounded-3xl text-center"><h2 className="text-4xl font-bold mb-4 text-red-500">GAMEOVER</h2><button onClick={() => setOver(false)||setObs([])} className="bg-pink-500 text-white px-8 py-3 rounded-full font-bold">RETRY</button></div></div>}
                </div>
            );
        };

        // --- 2. シューティングゲーム ---
        const ShooterGame = ({ onBack }) => {
            const [y, setY] = useState(window.innerHeight / 2);
            const [bullets, setBullets] = useState([]);
            const [enemies, setEnemies] = useState([]);
            const [score, setScore] = useState(0);

            const move = (e) => {
                const ty = e.touches ? e.touches[0].clientY : e.clientY;
                setY(ty - 50);
            };

            const fire = () => setBullets(p => [...p, { id: Date.now(), x: 150, y: y + 30 }]);

            useEffect(() => {
                const i = setInterval(() => {
                    setBullets(prev => prev.map(b => ({ ...b, x: b.x + 12 })).filter(b => b.x < window.innerWidth));
                    setEnemies(prev => {
                        let next = prev.map(en => ({ ...en, x: en.x - 6 }));
                        bullets.forEach(b => {
                            next.forEach(en => {
                                if (b.x > en.x && b.x < en.x+60 && b.y > en.y && b.y < en.y+60) {
                                    en.hit = true;
                                    setScore(s => s + 100);
                                    confetti({ particleCount: 30, spread: 50, origin: { x: b.x/window.innerWidth, y: b.y/window.innerHeight } });
                                }
                            });
                        });
                        return next.filter(en => en.x > -100 && !en.hit);
                    });
                }, 20);
                return () => clearInterval(i);
            }, [bullets]);

            useEffect(() => {
                const i = setInterval(() => {
                    setEnemies(p => [...p, { id: Date.now(), x: window.innerWidth, y: Math.random()*(window.innerHeight-200)+50 }]);
                }, 1000);
                return () => clearInterval(i);
            }, []);

            return (
                <div className="w-screen h-screen bg-indigo-900 relative overflow-hidden" onMouseMove={move} onTouchMove={move} onClick={fire}>
                    <div className="absolute top-10 w-full text-center text-yellow-400 text-4xl font-black drop-shadow-lg">SCORE: {score}</div>
                    <button onClick={onBack} className="absolute top-4 right-4 bg-white/20 text-white px-4 py-2 rounded-full z-50">EXIT</button>
                    <div className="absolute" style={{ top: y, left: 50 }}>
                        <img src="pony.png" style={{ width: '130px', transform: 'scaleX(-1)' }} />
                    </div>
                    {bullets.map(b => <div key={b.id} className="absolute text-4xl" style={{ left: b.x, top: b.y }}>🧲</div>)}
                    {enemies.map(e => <div key={e.id} className="absolute text-5xl" style={{ left: e.x, top: e.y }}>🐦</div>)}
                </div>
            );
        };

        // --- 3. ポニーキャッチ ---
        const CatchGame = ({ onBack }) => {
            const [x, setX] = useState(window.innerWidth / 2 - 60);
            const [items, setItems] = useState([]);
            const [score, setScore] = useState(0);
            const [over, setOver] = useState(false);

            const move = (e) => {
                const tx = e.touches ? e.touches[0].clientX : e.clientX;
                setX(tx - 65);
            };

            useEffect(() => {
                const i = setInterval(() => {
                    if (over) return;
                    setItems(prev => {
                        let next = prev.map(it => ({ ...it, y: it.y + 6 }));
                        next.forEach(it => {
                            if (it.y > window.innerHeight - 180 && it.y < window.innerHeight - 80 && it.x > x - 20 && it.x < x + 100) {
                                if (it.type === '💣') setOver(true);
                                else if (!it.hit) {
                                    it.hit = true;
                                    setScore(s => s + 50);
                                    confetti({ particleCount: 20, spread: 50, origin: { x: it.x/window.innerWidth, y: 0.8 } });
                                }
                            }
                        });
                        return next.filter(it => it.y < window.innerHeight && !it.hit);
                    });
                }, 20);
                return () => clearInterval(i);
            }, [x, over]);

            useEffect(() => {
                const i = setInterval(() => {
                    if (over) return;
                    const types = ['🍎', '🍎', '🥕', '💣'];
                    setItems(p => [...p, { id: Date.now(), x: Math.random()*(window.innerWidth-50), y: -50, type: types[Math.floor(Math.random()*4)], hit: false }]);
                }, 800);
                return () => clearInterval(i);
            }, [over]);

            return (
                <div className="w-screen h-screen bg-sky-300 relative overflow-hidden" onMouseMove={move} onTouchMove={move}>
                    <div className="absolute top-10 w-full text-center text-white text-4xl font-black drop-shadow-md">SCORE: {score}</div>
                    <button onClick={onBack} className="absolute top-4 right-4 bg-white/30 text-white px-4 py-2 rounded-full z-50">EXIT</button>
                    <div className="absolute bottom-0 w-full h-24 bg-green-500 border-t-4 border-green-600"></div>
                    <div className="absolute" style={{ left: x, bottom: '80px' }}>
                        <img src="pony.png" style={{ width: '130px' }} />
                    </div>
                    {items.map(it => <div key={it.id} className="absolute text-5xl" style={{ left: it.x, top: it.y }}>{it.type}</div>)}
                    {over && <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50"><div className="bg-white p-10 rounded-3xl text-center"><h2 className="text-4xl font-bold mb-4 text-red-500">BOOM! 💣</h2><button onClick={() => setOver(false)||setItems([])||setScore(0)} className="bg-yellow-500 text-white px-8 py-3 rounded-full font-bold">RETRY</button></div></div>}
                </div>
            );
        };

        // --- メイン画面 ---
        const Main = () => {
            const [page, setPage] = useState('menu');
            if (page === 'menu') return (
                <div className="flex flex-col items-center justify-center h-screen bg-pink-50 relative">
                    <CloudBackground />
                    <h1 className="text-6xl font-black text-pink-500 mb-2 z-10 drop-shadow-lg">Pony Games</h1>
                    <p className="text-pink-400 font-bold mb-8 z-10 text-xl italic text-center">70 Games Challenge!<br/>Goal: 3 / 70</p>
                    <div className="grid grid-cols-1 gap-4 w-72 z-10">
                        <button onClick={() => setPage('jump')} className="bg-green-500 text-white py-4 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-transform">🏃‍♂️ Pony Jump</button>
                        <button onClick={() => setPage('shoot')} className="bg-blue-500 text-white py-4 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-transform">🎯 Pony Shooter</button>
                        <button onClick={() => setPage('catch')} className="bg-yellow-500 text-white py-4 rounded-2xl text-xl font-bold shadow-lg active:scale-95 transition-transform">🍎 Pony Catch</button>
                    </div>
                </div>
            );
            if (page === 'jump') return <JumpGame onBack={() => setPage('menu')} />;
            if (page === 'shoot') return <ShooterGame onBack={() => setPage('menu')} />;
            if (page === 'catch') return <CatchGame onBack={() => setPage('menu')} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
