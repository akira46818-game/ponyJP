<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pony Jump Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f9ff; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #87CEEB; border-bottom: 4px solid #4ade80; cursor: pointer; }
        .ui { position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: #1e293b; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div id="msg" style="margin-top: 20px; color: #64748b;">クリックかスペースキーでジャンプ！</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = 800;
        canvas.height = 400;

        let score = 0;
        let gameActive = true;

        const pony = {
            x: 50,
            y: 300,
            width: 40,
            height: 40,
            gravity: 0.6,
            lift: -12,
            velocity: 0,
            jump() {
                if (this.y === 300) this.velocity = this.lift;
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                if (this.y > 300) {
                    this.y = 300;
                    this.velocity = 0;
                }
            },
            draw() {
                ctx.fillStyle = '#ff69b4'; // ポニーの色（ピンク）
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // 目を描く
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 25, this.y + 10, 8, 8);
            }
        };

        const obstacles = [];
        function spawnObstacle() {
            if (gameActive) {
                obstacles.push({
                    x: canvas.width,
                    y: 310,
                    width: 30,
                    height: 30,
                    speed: 5 + (score / 10)
                });
            }
            setTimeout(spawnObstacle, 1500 + Math.random() * 1000);
        }

        function loop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(0, 340, canvas.width, 60);

            pony.update();
            pony.draw();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacles[i].speed;
                ctx.fillStyle = '#475569';
                ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

                // 衝突判定
                if (pony.x < obstacles[i].x + obstacles[i].width &&
                    pony.x + pony.width > obstacles[i].x &&
                    pony.y < obstacles[i].y + obstacles[i].height &&
                    pony.y + pony.height > obstacles[i].y) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                }
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') pony.jump(); });
        canvas.addEventListener('mousedown', () => pony.jump());

        spawnObstacle();
        loop();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pony Jump Party - Full Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #f0f9ff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .pony-sprite { font-size: 40px; }
        .mountain { position: absolute; bottom: 100px; opacity: 0.3; z-index: -1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Game = () => {
            const [score, setScore] = useState(0);
            const [isGameOver, setIsGameOver] = useState(false);
            const [ponyY, setPonyY] = useState(250);
            const [isJumping, setIsJumping] = useState(false);
            const [obstacles, setObstacles] = useState([]);

            // ゲームループ
            useEffect(() => {
                if (isGameOver) return;
                const timer = setInterval(() => {
                    setObstacles(obs => obs.map(o => ({ ...o, x: o.x - 7 })).filter(o => o.x > -50));
                    setScore(s => s + 1);
                }, 30);
                return () => clearInterval(timer);
            }, [isGameOver]);

            // 障害物生成
            useEffect(() => {
                if (isGameOver) return;
                const timer = setInterval(() => {
                    setObstacles(obs => [...obs, { x: 800, id: Date.now() }]);
                }, 2000);
                return () => clearInterval(timer);
            }, [isGameOver]);

            // ジャンプ処理
            const jump = () => {
                if (isJumping || isGameOver) return;
                setIsJumping(true);
                let height = 0;
                const up = setInterval(() => {
                    if (height >= 120) {
                        clearInterval(up);
                        const down = setInterval(() => {
                            if (height <= 0) {
                                clearInterval(down);
                                setIsJumping(false);
                            }
                            height -= 5;
                            setPonyY(250 - height);
                        }, 15);
                    }
                    height += 5;
                    setPonyY(250 - height);
                }, 15);
            };

            // 当たり判定
            useEffect(() => {
                obstacles.forEach(obs => {
                    if (obs.x < 90 && obs.x > 30 && ponyY > 210) {
                        setIsGameOver(true);
                        confetti();
                    }
                });
            }, [obstacles, ponyY]);

            return (
                <div className="h-screen w-screen flex flex-col items-center justify-center relative bg-sky-300" onClick={jump}>
                    <div className="absolute top-10 text-4xl font-bold text-white drop-shadow-lg">Score: {Math.floor(score/10)}</div>
                    
                    {/* 背景の山 */}
                    <div className="absolute bottom-24 w-full flex justify-around opacity-50">
                        <div className="text-9xl">⛰️</div>
                        <div className="text-9xl">⛰️</div>
                    </div>

                    {/* 馬（ポニー） */}
                    <div style={{ position: 'absolute', left: '50px', top: `${ponyY}px` }} className="text-6xl transition-transform">
                        {isGameOver ? '😵' : '🐎'}
                    </div>

                    {/* 障害物 */}
                    {obstacles.map(obs => (
                        <div key={obs.id} style={{ position: 'absolute', left: `${obs.x}px`, top: '260px' }} className="text-5xl">
                            🚧
                        </div>
                    ))}

                    {/* 地面 */}
                    <div className="absolute bottom-0 w-full h-24 bg-green-500 border-t-8 border-green-600"></div>

                    {isGameOver && (
                        <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-white">
                            <h2 className="text-6xl font-bold mb-4">GAME OVER</h2>
                            <button onClick={() => location.reload()} className="bg-white text-black px-8 py-4 rounded-full text-2xl font-bold hover:scale-110 transition">RETRY</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Game />);
    </script>
</body>
</html>
