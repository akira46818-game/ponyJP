    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    let selectedQuizzes = [];
    let current = 0;
    let score = 0;
    let answered = false;

    const horseList = document.getElementById("horseList");
    const questionNo = document.getElementById("questionNo");
    const scoreEl = document.getElementById("score");
    const raceTitle = document.getElementById("raceTitle");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const explain = document.getElementById("explain");
    const nextBtn = document.getElementById("nextBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const retryBtn = document.getElementById("retryBtn");

    function setupGame() {
      selectedQuizzes = shuffle(allQuizzes).slice(0, 5);
      current = 0;
      score = 0;
      answered = false;
      rewardBtn.style.display = "none";
      retryBtn.style.display = "none";
      nextBtn.style.display = "block";
      renderQuiz();
    }

    function renderQuiz() {
      answered = false;
      resultBox.style.display = "none";

      const quiz = selectedQuizzes[current];
      questionNo.textContent = current + 1;
      scoreEl.textContent = score;
      raceTitle.textContent = `第${current + 1}問`;

      horseList.innerHTML = "";
      quiz.horses.forEach(horse => {
        const btn = document.createElement("button");
        btn.className = "horse-btn";
        btn.innerHTML = `
          <div class="horse-name">🐴 ${horse.name}</div>
          <div class="info-line">${horse.info}</div>
          <div class="odds">単勝 ${horse.odds}</div>
        `;
        btn.onclick = () => answer(horse.name);
        horseList.appendChild(btn);
      });
    }

    function answer(selectedName) {
      if (answered) return;
      answered = true;

      const quiz = selectedQuizzes[current];
      const correct = selectedName === quiz.answer;
      const answerHorse = quiz.horses.find(h => h.name === quiz.answer);

      resultBox.style.display = "block";

      if (correct) {
        score++;
        scoreEl.textContent = score;
        resultBox.className = "result-box correct";
        resultTitle.textContent = "🎉 正解！";
      } else {
        resultBox.className = "result-box wrong";
        resultTitle.textContent = "❌ 不正解";
      }

      explain.textContent = `正解は「${quiz.answer}」です。${answerHorse.reason}`;

      if (current === selectedQuizzes.length - 1) {
        nextBtn.style.display = "none";
        retryBtn.style.display = "block";
        if (score >= 3) {
          rewardBtn.style.display = "block";
        } else {
          rewardBtn.style.display = "none";
        }
      } else {
        nextBtn.style.display = "block";
        retryBtn.style.display = "none";
        rewardBtn.style.display = "none";
      }
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartGame() {
      setupGame();
    }

    setupGame();
  </script>
